  "유해화학물질 사용량": {

    cutoff:{ko:"보고연도 1.1–12.31 입고 수량 (재고수불부 기준, KG 단위)",en:"Receipt qty during Jan 1 – Dec 31 (per inventory ledger, KG unit)",zh:"报告年度1.1–12.31入库数量（按库存收发簿，KG单位）"},
    evidence:{ko:"재고수불부 Raw 시트 × GHS 8차 마스터 리스트 140종 CAS 교차 대조. 추출 조건: ① 평가클래스 = 3000(원재료) + 3010(부재료) + 5000(저장품 중 화학물질), ② 단위 = KG, ③ 입고(수량) 컬럼 합산. 자재명 첫 단어로 1차 매칭 후 CAS 확정",en:"Inventory ledger Raw sheet × GHS Rev.8 master list (140 substances) cross-checked by CAS. Extraction: ① Valuation Class 3000(raw)+3010(sub)+5000(consumable chemicals), ② Unit=KG, ③ sum 입고(수량) column. First-word match on material name then CAS confirmation",zh:"库存收发簿Raw表 × GHS第8版主列表140种物质按CAS交叉核对。提取条件：① 估价类别=3000(原材料)+3010(辅材料)+5000(消耗品中化学物质)，② 单位=KG，③ 入库(数量)列汇总。物料名称首词匹配后确认CAS"},
    standardMapping:{ko:"표준 매핑 키워드 9종 (FY2025 통일 적용): MDI*→101-68-8 / DMAC*·DMA→127-19-5(DMAc) / EDA*→107-15-3(에틸렌디아민) / DEAM*→111-42-2(Diethanolamine, 광동스판 한정) / DEA*→109-89-7(Diethylamine) / DETA→111-40-0 / PDA→78-90-0(1,2-Propylenediamine) / 盐酸·HCl→7647-01-0 / 液碱·苛性钠·NaOH→1310-73-2",en:"Standard mapping keywords (9, FY2025 unified): MDI*→101-68-8 / DMAC*·DMA→127-19-5 / EDA*→107-15-3 / DEAM*→111-42-2 (Guangdong only) / DEA*→109-89-7 / DETA→111-40-0 / PDA→78-90-0 / HCl→7647-01-0 / NaOH→1310-73-2",zh:"标准映射关键词9种（FY2025统一适用）：MDI*→101-68-8 / DMAC*·DMA→127-19-5 / EDA*→107-15-3 / DEAM*→111-42-2（仅广东）/ DEA*→109-89-7 / DETA→111-40-0 / PDA→78-90-0 / 盐酸·HCl→7647-01-0 / 液碱·苛性钠·NaOH→1310-73-2"},
    decisionTree:{ko:"① 재고수불부 Raw에서 법인·평가클래스(3000/3010/5000)·KG 필터 → ② 자재명 첫 단어(언더바·공백 분할) 추출 → ③ 표준 매핑 키워드 9종과 대조 → ④ 매칭 시 CAS 확정 → ⑤ GHS 마스터 140종 검증 → ⑥ 입고수량 합산 (kg→ton 환산). 연도 간 포함 물질 범위 일관 유지 필수. 신규 자재 출현 시 표준 매핑 보강",en:"① Filter inventory Raw by entity·VC(3000/3010/5000)·KG → ② Extract first word from material name (split by underscore/space) → ③ Match against 9 standard keywords → ④ Confirm CAS → ⑤ Verify against GHS 140 master list → ⑥ Sum receipt qty (kg→ton). Maintain consistent substance scope across years. Update mapping when new materials appear",zh:"① 库存Raw按法人·估价类别(3000/3010/5000)·KG筛选 → ② 提取物料名称首词（按下划线/空格分割）→ ③ 与9种标准关键词比对 → ④ 确认CAS → ⑤ 与GHS主列表140种核对 → ⑥ 入库数量汇总（kg→吨）。各年度涵盖物质范围保持一致。出现新物料时补充映射"},
    gri:{ko:"GRI 2016 자체 지표 (UN GHS Rev.8 기준)",en:"Custom indicator (UN GHS Rev.8 basis)",zh:"自定义指标（联合国GHS第8修订版标准）"},
    updated:"2026-04-16"

"울산:유해화학물질 사용량":{ko:{confirmed:"FY2023 89,725.17 / FY2024 112,476.87 / FY2025 96,905.71 ton (MEG 단일 자재)",basis:["[본사 정책] 행103 산정 기준: 재고수불부 평가클래스 3000(원재료) × GHS 8차/EU CLP 분류 140종 마스터 리스트 교차 매칭, 출고소계(소비량) 기준. 연료·소모품·공정보조제(평가클래스 5000)는 GRI 302/103(에너지)에서 별도 보고.","울산공장(플랜트 1204 나일론 + 1216 PET) 재고수불부 3개년 전수 매칭 결과: VC 3000 자재 중 GHS 140종 매칭 = MEG(에틸렌글리콜, CAS 107-21-1) 1건","미매칭 주요 자재(140종 외): TPA·PTA·QTA(테레프탈산), CAPROLACTAM(나일론 원료), NY 6 RESIN 등 - GHS 분류 유해화학물질 외","법인 기존 제출값(FY23 332 / FY24 363 ton)은 본사 표준 산출값(89,725 / 112,477 ton)의 약 0.4% 수준으로 정의 자체의 차이로 추정됨. 울산 환경 담당자 산출 근거 별도 확인 예정", "[2026-04-29 v48] 울산공장 0428 회신본 R103 = 207.247톤 (제품 사용량 기준). 본사 산출 96,905.71톤 (재고수불부 입고량 기준) 유지 - 메모리 §1.5 본사 일괄 산출 정책 + 정의 차이 (본사: 원료 입고량 / 법인: 제품 사용량). 약 470배 차이는 산정 범위 차이로 정상."],meta:"FY26부터 본사 일괄 산출 표준 적용 예정. 울산은 나일론+PET 복합 사업부"},en:{confirmed:"FY2023 89,725.17 / FY2024 112,476.87 / FY2025 96,905.71 ton (MEG single substance)",basis:["[HQ Policy] Row 103 calculation basis: Inventory ledger valuation class 3000 (raw materials) × GHS 8th/EU CLP-classified 140-substance master list cross-match, based on outflow subtotal (consumption). Fuels, supplies, and process aids (valuation class 5000) reported separately under GRI 302/103 (Energy).","Ulsan plant (plant 1204 Nylon + 1216 PET) inventory ledger 3-year full match: 1 substance matched with GHS 140-master list = MEG (ethylene glycol, CAS 107-21-1)","Major unmatched materials (outside 140-master): TPA, PTA, QTA (terephthalic acid), CAPROLACTAM (nylon raw material), NY 6 RESIN - outside GHS-classified hazardous chemicals","Existing subsidiary submission (FY23 332 / FY24 363 ton) is approximately 0.4% of HQ standard calculation (89,725 / 112,477 ton), suggesting fundamental definition difference. To be verified separately with Ulsan environmental representative", "[2026-04-29 v48] Ulsan 0428 response R103 = 207.247 t (product usage basis). HQ calculation 96,905.71 t (inventory ledger input basis) retained per memory §1.5 + scope difference (HQ: raw material input / Subsidiary: product usage). ~470x difference normal due to scope."],meta:"HQ-managed unified calculation standard to be applied from FY26. Ulsan is combined Nylon+PET division"},zh:{confirmed:"FY2023 89,725.17 / FY2024 112,476.87 / FY2025 96,905.71吨（MEG单一物质）",basis:["[总部政策] 第103行测算基准：库存收发簿评估类别3000（原材料）× GHS 8版/EU CLP分类140种主列表交叉对比，按出货合计（消耗量）。燃料·消耗品·工艺辅助剂（评估类别5000）按GRI 302/103（能源）单独报告。","蔚山工厂（工厂1204尼龙 + 1216 PET）库存收发簿3年度全量匹配：VC 3000物料中GHS 140种匹配 = MEG（乙二醇，CAS 107-21-1）1种","未匹配主要物料（140种外）：TPA·PTA·QTA（对苯二甲酸）、CAPROLACTAM（尼龙原料）、NY 6 RESIN等 - GHS分类有害化学物质外","法人原提交值（FY23 332 / FY24 363吨）约为总部标准测算值（89,725 / 112,477吨）的0.4%，疑为定义本身差异。计划另行向蔚山环境负责人确认测算依据", "[2026-04-29 v48] 蔚山0428回复R103 = 207.247吨(产品使用量基准). 总部计算96,905.71吨(库存账簿入库量基准)维持 - 备忘录§1.5总部统一计算政策+定义差异(总部: 原料入库量/法人: 产品使用量). 约470倍差异因范围不同, 正常."],meta:"FY26起拟应用总部统一测算标准。蔚山为尼龙+PET复合事业部"}},

    "취저우스판:폐기물 처리 비용":{ko:{confirmed:"FY2025 폐기물 처리비 ¥6,286,125.18 (세전, 不含税). 시트 6 SAP 8개 카테고리 전표 ¥6,043,689.18 + v42 신규 2채널 ¥242,436 = v44 재산출.",basis:["v44 재산출 사유: 법인 시트 6(环境数据来源) 본사 SAP 회계 시스템 위험폐기물 처리비 8개 카테고리 전표 합계가 가장 정확한 SSOT로 확정. 본사 인보이스 직접 검증 v40 ¥5,935,798.26 대신 SAP 직접 합계 ¥6,043,689.18 채택.", "SAP 8개 카테고리 분해 (시트 6 R125·R143·R163·R186·R216·R245·R267·R289):", "  ① 위험폐기물 처리비 (R125): ¥2,523,301.58 ② 폐포장용기 처리비 (R143): ¥136,611.53 ③ 위험폐기물 추가 5월~ (R163): ¥548,365.50 ④ 위험폐기물 화물운송비 (R186): ¥255,484.76", "  ⑤ 추가 운송비 (R216): ¥441,105.68 ⑥ 추가 카테고리 (R245): ¥1,109,990.17 ⑦ 추가 카테고리 (R267): ¥589,142.78 ⑧ 추가 카테고리 (R289): ¥439,687.18", "신규 2채널 별도 합산 (SAP 미포함 확인): 柯洁(高排放一般固废) ¥62,476 + 国新(聚合包装袋 焚烧) ¥179,960 = ¥242,436. SAP 적요(R93~R200+) 검색 결과 '高排放一般固废' 또는 '聚合包装袋 焚烧' 키워드 미발견 → 신규 2채널은 SAP 회계 코드 외 별도 처리 확인.", "처분 채널 6+1 (v44 정정): v40 4채널 + v42 신규 2채널 + ⚠ 시트 5에서 신규 발견 5번째 채널 绍兴凤登环保有限公司 (소흥 봉등 환경보호) 1~4월 정제잔사 처리 (5월부터 浙江春晖로 전환). 凤登 처리량은 시트 5 R6-R8에 ¥0 표시 → 1~4월 凤登 채널 미사용 또는 별도 회계 처리 후속 검토 필요.", "v40 (¥5,935,798.26) → v42 (¥6,178,234.26) → v44 (¥6,286,125.18) 변동: v44가 SAP 기반으로 가장 정확. v40 본사 직접 검증과 SAP 차이 ¥107,890.92은 본사 검증 시 일부 카테고리 누락 가능성.", "법인 제출값 ¥5,910,531.15(시트 5 R78) 대비 SAP +¥133,158.03 차이: 법인 시트 5는 위험폐기물 지급 명세만 다루고, SAP는 폐포장용기·운송비·추가 카테고리까지 모두 포함하기 때문.", "정리표 좌측 ¥6,026,318.93 (2025년 환경 정량 증빙 정리) 대비 SAP +¥17,370.25: 정리표는 카테고리 분류 다소 다름.", "⚠ 5번째 채널 绍兴凤登环保 후속 검토 필요 + 행60·61 처분코드 매핑 (柯洁·国新·凤登) 추후 정리"],meta:"2026-04-29 v44 재산출 (시트 6 SAP 8개 카테고리 ¥6,043,689.18 + 신규 2채널 ¥242,436 = ¥6,286,125.18)"},en:{confirmed:"FY2025 Waste disposal cost ¥6,286,125.18 (pre-tax). Sheet 6 SAP 8-category vouchers ¥6,043,689.18 + v42 new 2 channels ¥242,436 = v44 recalculated.",basis:["v44 recalculation rationale: Subsidiary sheet 6 (Environmental Data Source) HQ SAP system hazardous waste 8-category voucher total confirmed as most accurate SSOT. Adopted SAP direct total ¥6,043,689.18 instead of HQ invoice direct verification v40 ¥5,935,798.26.", "SAP 8-category breakdown (Sheet 6 R125·R143·R163·R186·R216·R245·R267·R289):", "  (1) Hazardous waste disposal (R125): ¥2,523,301.58 (2) Waste packaging container (R143): ¥136,611.53 (3) Hazardous waste additional May~ (R163): ¥548,365.50 (4) Hazardous waste freight (R186): ¥255,484.76", "  (5) Additional freight (R216): ¥441,105.68 (6) Additional category (R245): ¥1,109,990.17 (7) Additional category (R267): ¥589,142.78 (8) Additional category (R289): ¥439,687.18", "New 2 channels separately added (SAP exclusion confirmed): Keke (high-emission general solid waste) ¥62,476 + Guoxin (polymerization packaging bags incineration) ¥179,960 = ¥242,436. SAP descriptions search found no 'high-emission general solid waste' or 'polymerization packaging incineration' keywords - new 2 channels confirmed as separate handling outside SAP environmental codes.", "Disposal channels 6+1 (v44 correction): v40 4 channels + v42 new 2 channels + warning: 5th channel newly discovered in Sheet 5 - Shaoxing Fengdeng Environmental (Jan~Apr distillation residue, switched to Zhejiang Chunhui from May). Fengdeng usage shown as 0 in Sheet 5 R6-R8 - either unused or separate accounting handling, follow-up review needed.", "v40 (¥5,935,798.26) -> v42 (¥6,178,234.26) -> v44 (¥6,286,125.18) progression: v44 most accurate based on SAP. v40 HQ verification vs SAP difference ¥107,890.92 likely due to category omission during HQ verification.", "Subsidiary submission ¥5,910,531.15 (Sheet 5 R78) vs SAP +¥133,158.03: Sheet 5 covers only hazardous waste payment details, while SAP includes packaging containers, freight, and additional categories.", "Summary table ¥6,026,318.93 (2025 Environmental Quantitative Evidence) vs SAP +¥17,370.25: Different category classification.", "Warning: 5th channel Shaoxing Fengdeng follow-up review + rows 60·61 disposal code mapping (Keke·Guoxin·Fengdeng) pending."],meta:"2026-04-29 v44 recalculated (Sheet 6 SAP 8 categories ¥6,043,689.18 + new 2 channels ¥242,436)"},zh:{confirmed:"FY2025 废弃物处理费 ¥6,286,125.18 (税前, 不含税). 表6 SAP 8个类别凭证 ¥6,043,689.18 + v42新增2渠道 ¥242,436 = v44重新核算.",basis:["v44重新核算理由: 法人表6(环境数据来源)总部SAP会计系统危险废弃物处理费8个类别凭证总额确认为最准确SSOT. 采纳SAP直接合计¥6,043,689.18, 取代总部发票直接验证v40 ¥5,935,798.26.", "SAP 8个类别分解(表6 R125·R143·R163·R186·R216·R245·R267·R289):", "  ① 危险废弃物处理费(R125): ¥2,523,301.58 ② 废包装容器处理费(R143): ¥136,611.53 ③ 危险废弃物追加5月起(R163): ¥548,365.50 ④ 危险废弃物货物运输费(R186): ¥255,484.76", "  ⑤ 追加运输费(R216): ¥441,105.68 ⑥ 追加类别(R245): ¥1,109,990.17 ⑦ 追加类别(R267): ¥589,142.78 ⑧ 追加类别(R289): ¥439,687.18", "新增2渠道单独合算(SAP外确认): 柯洁(高排放一般固废) ¥62,476 + 国新(聚合包装袋焚烧) ¥179,960 = ¥242,436. SAP摘要搜索未发现'高排放一般固废'或'聚合包装袋焚烧'关键词 - 新增2渠道在SAP环保代码外另行处理.", "处置渠道6+1(v44更正): v40 4渠道 + v42新增2渠道 + ⚠ 表5新发现第5渠道绍兴凤登环保有限公司(1~4月精制残渣, 5月起转浙江春晖). 凤登使用量在表5 R6-R8显示¥0 - 1~4月凤登未使用或另行会计处理, 待后续审查.", "v40 (¥5,935,798.26) → v42 (¥6,178,234.26) → v44 (¥6,286,125.18) 变动: v44基于SAP最准确. v40总部验证与SAP差额 ¥107,890.92 可能因总部验证时类别遗漏.", "法人提交值 ¥5,910,531.15(表5 R78) vs SAP +¥133,158.03: 表5仅涵盖危险废弃物支付明细, SAP包含包装容器·运输费·追加类别.", "整理表 ¥6,026,318.93 (2025环境定量证明整理) vs SAP +¥17,370.25: 分类略有不同.", "⚠ 第5渠道绍兴凤登后续审查 + 行60·61处置代码映射(柯洁·国新·凤登)待后续整理"],meta:"2026-04-29 v44 重新核算 (表6 SAP 8个类别 ¥6,043,689.18 + 新增2渠道 ¥242,436)"} }, "취저우스판:공업용수":{ko:{confirmed:"FY2025 공업용수 사용량 546,715.59 톤. 12개월 수도료 인보이스(2025/01~12 발행) 100% 본사 직접 검증. 법인 자체 양식 매핑에 따라 v43에서 행71→행72로 정정 등록.",basis:["공급사 → 신재료 법인(晓星新材料科技 衢州 有限公司) 일괄 수령 → 공장 표 미터값 비율로 두 법인 간 분담. 본 값은 분담 후 취저우스판 분.", "12개월 인보이스 합계: 사용량 546,715.59 톤, 세전 ¥978,069.16, 세후 ¥1,066,095.40. 단가 일관성 검증 완료(세전 ¥1.7889908/톤 = 세후 ¥1.95/톤, 9% VAT, 12개월 동일).", "월별 분담 비율: 취저우스판 85.72%~89.80% 범위(월 사용량 기반 변동). 1월 86.92%, 12월 87.31%.", "회계연도 매핑 기준: 인보이스 발행월 기준(A안). 2025년 1~12월 발행분 = FY2025.", "기준 정합 (검침 기간): 2024/12/06 ~ 2025/12/06 (12개월 누적 청구).", "v43 매핑 정정 사유: 법인 자체 양식이 본 인보이스 사용량을 행72(工业用水)에 입력 (FY2023 512,727 / FY2024 548,231.22 / FY2025 546,715.6 - 동일 출처 3개년 일관성). 또한 행71(自来水及生活用水)을 비워두어 법인이 행71/행72 구분을 명확히 인지함을 확인. 본사 v42 등록 시 품의서 본문 표현(生活用水 水费支付)에 의존하여 행71에 매핑한 것이 오류로 판명, v43에서 행72로 정정.", "월 사용량 규모(31,000~62,000 톤/월) 검토: 단순 직원 생활용수가 아닌 스판덱스 공장 공정수  "  ④ 연환산: 5.43 mg/L × 9.7 L/S × 86,400초 × 365일 / 10⁹ = 1.661033 톤/yr.", "측정 출처: 2025년 3월 19일 생산 폐수 배출구(DW001) 4시점 측정. 외부 검측사 위탁 검측보고서.", "⚠ BOD vs BOD₅ 정의 차이 명시: 법인은 BOD = 일평균 BOD (BOD₅÷5)로 산출. GRI 일반 정의는 BOD₅ 직접 사용. BOD₅ 직접 사용 시 8.305 톤. 외부 검증 시 산출 방식 명확 표기 필요.", "기준값: 「污水综合排放标准」(GB8978-1996) 표4 3급 BOD 300 mg/L. 측정값 27.15 mg/L = 기준값의 9.05% (충분 미달).", "FY23 (0.21톤) → FY24 (2.07톤) → FY25 (1.66톤): FY24 정점 후 -19.8% 감소. 측정 시점·생산량 변동 영향."],meta:"2026-04-29 v46 신규 등록 (시트 6 R331-R337 산출 공식, BOD = BOD₅÷5 환산 명시)"},en:{confirmed:"FY2025 BOD 1.661033 tons. Sheet 6 R331-R337 formula (BOD = BOD₅÷5 conversion + annualization).",basis:["Source: Sheet 6 R331-R337 BOD&SS area.", "Formula breakdown (subsidiary calculation):", "  (1) BOD₅ 27.15 mg/L (4-sample avg: 26.4 + 28.2 + 26.3 + 27.7 = 108.6/4)", "  (2) BOD = BOD₅ ÷ 5 = 5.43 mg/L (R336, daily avg conversion)", "  (3) Real-time flow: 9.7 L/S (R334 wastewater outlet online monitoring)", "  (4) Annual: 5.43 × 9.7 × 86,400 × 365 / 10⁹ = 1.661033 t/yr.", "Measurement: 2025.03.19 production wastewater outlet (DW001) 4-time-point. External testing institute report.", "Warning: BOD vs BOD₅ definition difference noted. Subsidiary calculates BOD = daily avg BOD (BOD₅÷5). GRI standard uses BOD₅ directly. Direct BOD₅ would be 8.305 tons. Calculation method must be explicitly stated in external verification.", "Standard: GB8978-1996 Table 4 Grade 3 BOD 300 mg/L. Measured 27.15 mg/L = 9.05% of standard (well below).", "FY23 (0.21 t) → FY24 (2.07 t) → FY25 (1.66 t): peak in FY24 then -19.8% decrease."],meta:"2026-04-29 v46 newly registered (Sheet 6 R331-R337 formula, BOD = BOD₅÷5 conversion)"},zh:{confirmed:"FY2025 生化需氧量(BOD) 1.661033 吨. 表6 R331-R337计算公式 (BOD = BOD₅÷5 换算+年换算).",basis:["来源: 表6 R331-R337 BOD&SS区.", "计算公式分解(法人计算方式):", "  ① BOD₅ 27.15 mg/L (4样品平均: R362 26.4 + R363 28.2 + R364 26.3 + R365 27.7 = 108.6/4)", "  ② BOD = BOD₅ ÷ 5 = 5.43 mg/L (R336, 日平均换算)", "  ③ 实时流量: 9.7 L/S (R334 废水排放口在线监控)", "  ④ 年换算: 5.43 × 9.7 × 86,400 × 365 / 10⁹ = 1.661033 吨/yr.", "测量来源: 2025年3月19日 生产废水排放口(DW001) 4时点测量. 外部检测机构委托检测报告.", "⚠ BOD vs BOD₅ 定义差异明示: 法人将BOD计算为日平均BOD(BOD₅÷5). GRI一般定义直接使用BOD₅. 直接使用BOD₅ 为8.305吨. 外部验证时计算方式需明确表记.", "标准值: 《污水综合排放标准》(GB8978-1996) 表4 3级 BOD 300 mg/L. 测量值27.15 mg/L = 标准值的9.05% (充分低于标准).", "FY23 (0.21吨) → FY24 (2.07吨) → FY25 (1.66吨): FY24顶点后 -19.8%减少."],meta:"2026-04-29 v46 新登记 (表6 R331-R337计算公式, BOD = BOD₅÷5换算明示)"} }, "취저우스판:부유물질(SS)":{ko:{confirmed:"FY2025 부유물질(SS) 3.747265 톤. 시트 6 R338-R339 산출 공식 (4샘플 평균 농도 × 유량 × 시간).",basis:["출처: 시트 6 환경 데이터 출처 R338-R339 부유물질 영역.", "산출 공식 분해:", "  ① SS 농도: 12.25 mg/L (4샘플 평균: R362 11 + R363 12 + R364 14 + R365 12 = 49/4)", "  ② 실시간 유량: 9.7 L/S (R334 폐수 배출구 온라인 모니터링)", "  ③ 연환산: 12.25 mg/L × 9.7 L/S × 86,400초 × 365일 / 10⁹ = 3.747265 톤/yr.", "측정 출처: 2025년 3월 19일 생산 폐수 배출구(DW001) 4시점 측정. 외부 검측사 위탁 검측보고서.", "기준값: 「污水综合排放标准」(GB8978-1996) 표4 3급 SS 400 mg/L. 측정값 12.25 mg/L = 기준값의 3.06% (충분 미달).", "산출 공식 정확성 확인: 4샘플 평균 → 연환산 표준 방식. BOD와 달리 SS는 단일 정의 → 산출 직접 적용 가능.", "FY23 (1.95톤) → FY24 (6.27톤) → FY25 (3.75톤): FY24 정점 후 -40.2% 감소. 폐수 처리 시설 개선 효과 + 정량하한 부근 변동 가능성 (메모리 §3.1 정량하한 부근 변동 = 설명 수용 사유)."],meta:"2026-04-29 v46 신규 등록 (시트 6 R338-R339 산출 공식 정확성 확인)"},en:{confirmed:"FY2025 SS 3.747265 tons. Sheet 6 R338-R339 formula (4-sample avg concentration × flow × time).",basis:["Source: Sheet 6 R338-R339 SS area.", "Formula breakdown:", "  (1) SS concentration: 12.25 mg/L (4-sample avg: R362 11 + R363 12 + R364 14 + R365 12 = 49/4)", "  (2) Real-time flow: 9.7 L/S (R334 wastewater outlet online monitoring)", "  (3) Annual: 12.25 × 9.7 × 86,400 × 365 / 10⁹ = 3.747265 t/yr.", "Measurement: 2025.03.19 production wastewater outlet (DW001) 4-time-point. External testing report.", "Standard: GB8978-1996 Table 4 Grade 3 SS 400 mg/L. Measured 12.25 mg/L = 3.06% (well below).", "Formula accuracy: 4-sample avg → annualization standard. Unlike BOD, SS has single definition → formula directly applicable.", "FY23 (1.95 t) → FY24 (6.27 t) → FY25 (3.75 t): peak in FY24 then -40.2% ,
      "닝샤스판:최종 방류지별 폐수 배출량 > 해양방류": { ko: "닝샤 자치구 닝동 산업단지(黄河 上游 내륙) 위치로 해양 접근 지리적 불가능. 해양방류 시설 및 경로 부재. 다른 모든 법인(가흥·광동·주해·브라질·인도·튀르키예) N/A 등록 일관 적용", en: "Ningxia Ningdong Industrial Park (Yellow River upstream inland) — geographically impossible to access ocean. No marine discharge facility or route. Consistent N/A with all other corporations (Jiaxing, Guangdong, Zhuhai, Brazil, India, Türkiye)", zh: "宁夏自治区宁东工业园区(黄河上游内陆)位置, 海洋接近地理性不可能。无海洋排放设施和路径。与其他所有法人(嘉兴·广东·珠海·巴西·印度·土耳其)N/A 登记一致适用" },
      "닝샤스판:최종 방류지별 폐수 배출량 > 위탁처리": { ko: "닝샤 폐수는 100% 兴蓉污水处理厂 위탁 처리(R76 하수처리에 332,420 m³ 등록). 별도 산업폐수 위탁 처리 시설 또는 경로 부재. 중국 3법인(가흥·광동·주해) N/A 등록 일관", en: "Ningxia 100% wastewater entrusted to Xingrong WWTP (R76 sewage treatment 332,420 m³ registered). No separate industrial wastewater entrusted treatment facility or route. Consistent with 3 Chinese corporations (Jiaxing, Guangdong, Zhuhai)", zh: "宁夏废水 100% 兴蓉污水处理厂委托处理(R76 污水处理 332,420 m³ 已登记)。无单独的工业废水委托处理设施或路径。与中国3法人(嘉兴·广东·珠海)N/A 登记一致" },
      "닝샤스판:하수 재이용수": { ko: "닝샤 폐수 兴蓉污水处理厂 위탁 처리로 사업장 자체 하수 재이용 시설 부재. R75 용수 재활용 130,140,000 m³(C11 신증설 폐쇄형 순환 냉각수)는 산업용수 순환이며 본 항목(처리된 하수의 재이용)과 구분. 중국 3법인+인도+튀르키예 N/A 등록 일관", en: "Ningxia wastewater entrusted to Xingrong WWTP, no in-house treated sewage reuse facility. R75 water recycling 130,140,000 m³ (C11 closed-loop cooling water) is industrial water circulation, distinct from this item. Consistent with N/A of Chinese 3 + India + Türkiye", zh: "宁夏废水兴蓉污水处理厂委托处理, 作业场所自身处理后污水再利用设施缺失。R75 水资源再利用 130,140,000 m³(C11新建闭路循环冷却水)为工业水循环, 与本项目区分。与中国3法人+印度+土耳其 N/A 登记一致" },
      "닝샤스판:일반대기오염물질 > 총탄화수소(THC)": { ko: "닝샤 환경부 排污许可证상 NMHC(비메탄 탄화수소)만 대기 측정 대상 (메모리 #12 NMHC 초과 사례 FY23 R111·R112 1건/¥30,000 존재). THC 자체는 측정 대상 외. 다른 중국 3법인(가흥·광동·주해) N/A 등록 일관", en: "Ningxia Discharge Permit lists only NMHC as air measurement target (Memory #12 confirms NMHC exceedance FY23 R111·R112). THC itself is not a measurement target. Consistent with 3 Chinese corporations N/A", zh: "宁夏环保部排污许可证仅 NMHC 为大气测量对象。THC 本身非测量对象。与中国3法人 N/A 登记一致" },
      "닝샤스판:유해대기오염물질(HAPs) > 염화수소(HCl)": { ko: "닝샤 스판덱스 제조 공정상 MDI는 외부 구매로 자체 합성 공정 부재. HCl 발생 가능 공정(MDI 합성·염소화 반응) 미운영. 중국 환경법규(GB 16297-1996)상 측정 대상 외. 다른 중국 3법인 N/A 등록 일관", en: "Ningxia spandex manufacturing uses externally purchased MDI; no in-house synthesis. No HCl-generating processes operated. Not a measurement target under GB 16297-1996. Consistent with 3 Chinese corporations N/A", zh: "宁夏氨纶制造工艺 MDI 为外部采购, 无自身合成工艺。无 HCl 发生工艺运营。中国环境法规(GB 16297-1996)非测量对象。与中国3法人 N/A 登记一致" },
      "닝샤스판:유해대기오염물질(HAPs) > 일산화탄소(CO)": { ko: "닝샤 도열유로(导热油炉) 운영하나 중국 환경법규(GB 13271-2014, GB 16297-1996)상 일반 산업용 보일러·도열유로 CO는 측정 대상 외. 排污许可证 측정 항목 미포함. 다른 중국 3법인 N/A 등록 일관", en: "Ningxia operates heat-oil furnace but Chinese regulations (GB 13271-2014, GB 16297-1996) exclude CO from general industrial boiler measurements. Not in Discharge Permit. Consistent with 3 Chinese corporations N/A", zh: "宁夏导热油炉运营, 但中国环境法规将 CO 排除在测量对象外。排污许可证测量项目不含。与中国3法人 N/A 登记一致" },
      "닝샤스판:지하수": { ko: "닝샤 취수원: 닝동 자연자원국(宁东自然资源局) 黄河水(지표수). 메모리 #11 「2025년 취수 현황 보고서(2025年取用水现状报告)」에서 확인. 사업장 지하수 취수 부재 (수자원 재이용률 99.24% 명시 + 「企业数据真实性承诺书」 검증). 다른 중국 3법인+인도 N/A 등록 일관", en: "Ningxia water source: Ningdong Natural Resources Bureau Yellow River surface water. Memory #11 「2025 Water Withdrawal Report」 confirms. No site groundwater withdrawal (reuse rate 99.24% + Authenticity Commitment verified). Consistent with 3 Chinese corporations + India N/A", zh: "宁夏取水来源: 宁东自然资源局 黄河水(地表水)。Memory #11 「2025年取用水现状报告」 确认。作业场所地下水取水缺失。与中国3法人+印度 N/A 登记一致" }
    ,
      "구미:최종 방류지별 폐수 배출량 > 해양방류": { ko: "한국 경상북도 구미 - 내륙(낙동강 중류) 위치. 해양 접근 지리적 불가능. 폐수는 한국 환경부 기준 자체 처리 후 낙동강 지류 방류 또는 위탁처리. 해양방류 시설 및 경로 부재. 다른 모든 법인(가흥무역·가흥스판·가흥화공·광동스판·닝샤스판·대구·주해스판·브라질스판·인도스판·튀르키예스판) N/A 등록 일관 적용", en: "Gumi (Korea Gyeongbuk) - inland (mid-Nakdong River) location. Geographically impossible to access ocean. Wastewater treated and discharged to Nakdong tributary or entrusted per Korean Ministry of Environment standards. No marine discharge facility or route. Consistent N/A registration with all other corporations", zh: "韩国庆尚北道龟尾 - 内陆(洛东江中游)位置。海洋接近地理性不可能。废水按韩国环境部标准自身处理后排放至洛东江支流或委托处理。无海洋排放设施和路径。与其他所有法人 N/A 登记一致适用" },
      "취저우스판:최종 방류지별 폐수 배출량 > 해양방류": { ko: "중국 절강성 취저우(衢州) - 钱塘江 상류 산악 내륙 지역. 해양 접근 지리적 불가능. 해양방류 시설 및 경로 부재. 다른 모든 법인(가흥무역·가흥스판·가흥화공·광동스판·닝샤스판·대구·주해스판·브라질스판·인도스판·튀르키예스판) N/A 등록 일관 적용", en: "Quzhou Spandex (Zhejiang Province) - upper Qiantang River (钱塘江) mountain inland region. Geographically impossible to access ocean. No marine discharge facility or route. Consistent N/A registration with all other corporations", zh: "中国浙江省衢州 - 钱塘江上游山岳内陆地区。海洋接近地理性不可能。无海洋排放设施和路径。与其他所有法人 N/A 登记一致适用" },
      "취저우네오캠:최종 방류지별 폐수 배출량 > 해양방류": { ko: "중국 절강성 취저우(衢州) - 钱塘江 상류 산악 내륙 지역, 취저우스판과 동일 지리적 위치. 해양 접근 지리적 불가능. 해양방류 시설 및 경로 부재. 다른 모든 법인(가흥무역·가흥스판·가흥화공·광동스판·닝샤스판·대구·주해스판·브라질스판·인도스판·튀르키예스판) N/A 등록 일관 적용", en: "Quzhou Neochem (Zhejiang Province) - upper Qiantang River (钱塘江) mountain inland region, same geographical location as Quzhou Spandex. Geographically impossible to access ocean. No marine discharge facility or route. Consistent N/A registration with all other corporations", zh: "中国浙江省衢州 - 钱塘江上游山岳内陆地区, 与衢州氨纶同地理位置。海洋接近地理性不可能。无海洋排放设施和路径。与其他所有法人 N/A 登记一致适用" },

function unitDisplay(unit, sub, lang, label) {

function fmt(v) {
  if (v === null || v === undefined) return null;
  if (Number.isInteger(v)) return v.toLocaleString();
  if (Math.abs(v) < 0.0001 && v !== 0) return v.toExponential(2);
  if (Math.abs(v) < 1) return v.toFixed(4);
  if (Math.abs(v) < 100) return v.toFixed(2);
  const s = v.toString();
  const dotIdx = s.indexOf('.');
  if (dotIdx === -1) return v.toLocaleString();
  const decimals = Math.min(s.length - dotIdx - 1, 6);
  return v.toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}

function yoyPct(prev, cur) {
  if (prev == null || cur == null) return null;
  if (prev === 0 && cur === 0) return 0;
  if (prev === 0) return cur > 0 ? 999 : -999;
  return (cur - prev) / Math.abs(prev);
}

function cellStatus(vals) {
  const [y23, y24, y25] = vals;
  const flags = [];
  // Missing 2025 when historical exists
  const hasHist = y23 != null || y24 != null;
  if (y25 == null && hasHist) flags.push("missing_2025");
  if (y25 == null && !hasHist) flags.push("no_data");
  // YoY anomalies (reporting year vs prior year only)
  const chg25 = yoyPct(y24, y25);
  if (chg25 != null && Math.abs(chg25) > YOY_THRESHOLD) flags.push("yoy_25");
  return flags;
}

function Sparkline({ vals }) {
  const valid = vals.map((v,i)=>v!=null?{v,i}:null).filter(Boolean);
  if (valid.length < 2) return <span style={{color:"#999",fontSize:10}}>—</span>;
  const mn = Math.min(...valid.map(d=>d.v));
  const mx = Math.max(...valid.map(d=>d.v));
  const range = mx-mn || 1;
  const pts = valid.map(d=>`${8+d.i*20},${30-((d.v-mn)/range)*24}`).join(" ");
  return <svg width="56" height="34" style={{verticalAlign:"middle"}}><polyline points={pts} fill="none" stroke="#6366f1" strokeWidth="2"/>{valid.map(d=><circle key={d.i} cx={8+d.i*20} cy={30-((d.v-mn)/range)*24} r="2.5" fill="#6366f1"/>)}</svg>;
}

            <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2023</th>
            <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2024</th>
            <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2025</th>
            <th style={{padding:"10px 8px",textAlign:"center",width:65,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("trend")}</th>
            <th style={{padding:"10px 8px",textAlign:"center",width:70,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>YoY%</th>
            <th style={{padding:"10px 8px",textAlign:"center",width:60,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("status")}</th>
            <th style={{padding:"10px 8px",textAlign:"center",width:50,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("verif")}</th>
          </tr>
        </thead>
        <tbody>
          {filteredIndicators.map((ind, idx) => {
            const d = ind.data[selSub] || [null,null,null];
            const flags = effectiveFlags(selSub, ind.label, d);
            const chg = yoyPct(d[1], d[2]);
            const vNote = isVerified(selSub, ind.label);
            const naNote = isNA(selSub, ind.label);
            const isNARow = flags.includes("na");
            return (
              <tr key={idx} style={{background: bgColor(flags), borderBottom:"1px solid #e2e8f0",transition:"background .15s"}}
                onMouseEnter={e=>e.currentTarget.style.background=isNARow?bgColor(flags):"#f1f5f9"}
                onMouseLeave={e=>e.currentTarget.style.background=bgColor(flags)}>
                <td style={{padding:"8px 12px",color:isNARow?"#94a3b8":"#64748b",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{t("cat",ind.cat)}</td>
                <td style={{padding:"8px 6px",textAlign:"center",fontSize:11,fontWeight:700,color:isNARow?"#94a3b8":"#6366f1",fontVariantNumeric:"tabular-nums",fontFamily:"monospace"}}>{getRow(ind.label) || "—"}</td>
                <td style={{padding:"8px 12px",fontWeight:500,color:isNARow?"#94a3b8":"#0f172a",cursor:isNARow?"help":"default"}} title={tNote(naNote)}>{ind.tier==="HQ_MANAGED" && <span style={{display:"inline-block",padding:"1px 6px",marginRight:6,fontSize:10,fontWeight:700,color:"#fff",background:"#6366f1",borderRadius:4,verticalAlign:"middle"}} title={tui("hqTooltip")}>🏢 HQ</span>}{t("label",ind.label)}{getManual(ind.label) && <button onClick={()=>setManualLabel(ind.label)} style={{border:"none",background:"none",cursor:"pointer",fontSize:12,marginLeft:4,padding:"0 2px",color:"#6366f1",verticalAlign:"middle"}} title={lang==="ko"?"집계 기준 매뉴얼":lang==="en"?"Reporting Manual":"集计标准手册"}>📖</button>}</td>
                <td style={{padding:"8px",textAlign:"center",color:"#94a3b8",fontSize:11}}>{(ind.unit==="현지화"||ind.unit==="천 단위 현지화")?unitDisplay(ind.unit, selSub, lang, ind.label):t("unit",ind.unit)}</td>
                <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[0]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[0]!=null?fmt(d[0]):"—"}</td>
                <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[1]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[1]!=null?fmt(d[1]):"—"}</td>
                <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",fontWeight:isNARow?400:600,color:isNARow?"#cbd5e1":d[2]==null?(flags.includes("missing_2025")?"#ef4444":"#cbd5e1"):"#0f172a"}}>{isNARow?"—":d[2]!=null?fmt(d[2]):flags.includes("missing_2025")?<span style={{color:"#ef4444",fontWeight:400}}>{tui("notEntered")}</span>:"—"}</td>
                <td style={{padding:"4px 8px",textAlign:"center"}}>{isNARow?<span style={{color:"#cbd5e1",fontSize:10}}>—</span>:<Sparkline vals={d}/>}</td>
                <td style={{padding:"8px",textAlign:"center",fontSize:12,fontWeight:600,color:isNARow?"#cbd5e1":chg==null?"#94a3b8":(Math.abs(chg)>YOY_THRESHOLD&&!vNote)?"#dc2626":"#16a34a"}}>
                  {isNARow?"—":chg!=null ? (chg>=0?"+":"") + (chg*100).toFixed(0)+"%" : "—"}
                </td>
                <td style={{padding:"8px",textAlign:"center"}} title={tNote(naNote||vNote)}>
                  {isNARow && <span title={tNote(naNote)} style={{color:"#94a3b8",fontSize:13,cursor:"help"}}>─</span>}
                  {!isNARow && flags.includes("missing_2025") && <span title={tui("missing25")} style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#fbbf24",color:"#fff",fontSize:11,fontWeight:700}}>!</span>}
                  {!isNARow && (flags.includes("yoy_24")||flags.includes("yoy_25")) && <span title={tui("yoyAnomaly")} style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#ef4444",color:"#fff",fontSize:11,fontWeight:700,marginLeft:2}}>⚠</span>}
                  {!isNARow && !flags.includes("missing_2025") && !flags.includes("yoy_24") && !flags.includes("yoy_25") && <span title={tNote(vNote)} style={{color:"#22c55e",fontSize:14,cursor:vNote?"help":"default"}}>✓</span>}
                </td>
                <td style={{padding:"8px",textAlign:"center"}}>
                  {(vNote||naNote) && <button onClick={(e)=>{e.stopPropagation();setVerifPanel({sub:selSub,label:ind.label});}} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,padding:"2px 4px",color:isNARow?"#94a3b8":"#22c55e",verticalAlign:"middle"}} title={lang==="ko"?"검수 내역 보기":lang==="en"?"View Verification":"查看审核记录"}>🔍</button>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
  );

  const renderByIndicatorTable = () => {
    const ind = RAW.indicators[selIndicator];
    if (!ind) return null;
    const subsWithData = SUBS.filter(s => ind.data[s] && ind.data[s].some(v => v != null));
    return (
      <div>
        <div style={{marginBottom:12}}>
          <select value={selIndicator} onChange={e=>setSelIndicator(+e.target.value)}
            style={{padding:"8px 12px",borderRadius:6,border:"1px solid #cbd5e1",fontSize:13,width:"100%",background:"#fff"}}>
            {filteredIndicators.map(ind => { const i = RAW.indicators.indexOf(ind); return <option key={i} value={i}>{getRow(ind.label) ? `${tui("row")}${getRow(ind.label)} ` : ""}{ind.tier==='HQ_MANAGED' ? '🏢 ' : ''}[{t("cat",ind.cat)}] {t("label",ind.label)} ({t("unit",ind.unit)})</option>; })}
          </select>
        </div>
        {ind.tier==="HQ_MANAGED" && <div style={{marginBottom:10,padding:"6px 12px",background:"#eef2ff",border:"1px solid #6366f1",borderRadius:6,fontSize:11,color:"#4338ca",fontWeight:600}} title={tui("hqTooltip")}>🏢 {tui("tierHQ")} — {tui("hqTooltip")}</div>}
        {getManual(ind.label) && <div style={{marginBottom:10,padding:"6px 12px",background:"#f5f3ff",border:"1px solid #c4b5fd",borderRadius:6,fontSize:11,color:"#5b21b6",cursor:"pointer"}} onClick={()=>setManualLabel(ind.label)}>📖 {lang==="ko"?"집계 기준 매뉴얼 보기":lang==="en"?"View Reporting Manual":"查看集计标准手册"}</div>}
        <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:13,fontFamily:"'Pretendard','Noto Sans KR',sans-serif"}}>
          <thead>
            <tr style={{background:"#1e293b",color:"#fff"}}>
              <th style={{padding:"10px 12px",textAlign:"left",position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("sub")}</th>
              <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2023</th>
              <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2024</th>
              <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2025</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:65,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("trend")}</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:80,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>YoY 24→25</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:60,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("status")}</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:50,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("verif")}</th>
            </tr>
          </thead>
          <tbody>
            {subsWithData.map(sub => {
              const d = ind.data[sub];
              const flags = effectiveFlags(sub, ind.label, d);
              const chg = yoyPct(d[1], d[2]);
              const isDom = RAW.domestic.includes(sub);
              const vNote = isVerified(sub, ind.label);
              const naNote = isNA(sub, ind.label);
              const isNARow = flags.includes("na");
              return (
                <tr key={sub} style={{background: bgColor(flags),borderBottom:"1px solid #e2e8f0"}}>
                  <td style={{padding:"8px 12px",fontWeight:500,color:isNARow?"#94a3b8":"#0f172a",cursor:isNARow?"help":"default"}} title={tNote(naNote)}>
                    <span style={{display:"inline-block",width:6,height:6,borderRadius:3,background:isDom?"#3b82f6":"#f59e0b",marginRight:6}}/>
                    {t("sub",sub)}{(ind.unit==="현지화"||ind.unit==="천 단위 현지화")&&<span style={{marginLeft:6,fontSize:10,color:"#94a3b8",fontWeight:400}}>({unitDisplay(ind.unit, sub, lang, ind.label)})</span>}
                  </td>
                  <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[0]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[0]!=null?fmt(d[0]):"—"}</td>
                  <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[1]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[1]!=null?fmt(d[1]):"—"}</td>
                  <td style={{padding:"8px",textAlign:"right",fontWeight:isNARow?400:600,color:isNARow?"#cbd5e1":d[2]==null?(flags.includes("missing_2025")?"#ef4444":"#cbd5e1"):"#0f172a"}}>{isNARow?"—":d[2]!=null?fmt(d[2]):flags.includes("missing_2025")?<span style={{color:"#ef4444",fontWeight:400}}>{tui("notEntered")}</span>:"—"}</td>
                  <td style={{padding:"4px 8px",textAlign:"center"}}>{isNARow?<span style={{color:"#cbd5e1",fontSize:10}}>—</span>:<Sparkline vals={d}/>}</td>
                  <td style={{padding:"8px",textAlign:"center",fontSize:12,fontWeight:600,color:isNARow?"#cbd5e1":chg==null?"#94a3b8":(Math.abs(chg)>YOY_THRESHOLD&&!vNote)?"#dc2626":"#16a34a"}}>
                    {isNARow?"—":chg!=null?(chg>=0?"+":"")+(chg*100).toFixed(0)+"%":"—"}
                  </td>
                  <td style={{padding:"8px",textAlign:"center"}} title={tNote(naNote||vNote)}>
                    {isNARow && <span title={tNote(naNote)} style={{color:"#94a3b8",fontSize:13,cursor:"help"}}>─</span>}
                    {!isNARow && flags.includes("missing_2025") && <span style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#fbbf24",color:"#fff",fontSize:11,fontWeight:700}}>!</span>}
                    {!isNARow && (flags.includes("yoy_24")||flags.includes("yoy_25")) && <span style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#ef4444",color:"#fff",fontSize:11,fontWeight:700,marginLeft:2}}>⚠</span>}
                    {!isNARow && !flags.includes("missing_2025") && !flags.includes("yoy_24") && !flags.includes("yoy_25") && <span title={tNote(vNote)} style={{color:"#22c55e",fontSize:14,cursor:vNote?"help":"default"}}>✓</span>}
                  </td>
                  <td style={{padding:"8px",textAlign:"center"}}>
                    {(vNote||naNote) && <button onClick={(e)=>{e.stopPropagation();setVerifPanel({sub:sub,label:ind.label});}} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,padding:"2px 4px",color:isNARow?"#94a3b8":"#22c55e",verticalAlign:"middle"}} title={lang==="ko"?"검수 내역 보기":lang==="en"?"View Verification":"查看审核记录"}>🔍</button>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  };

  return (
    <div style={{fontFamily:"'Pretendard','Noto Sans KR',system-ui,sans-serif",background:"#f8fafc",minHeight:"100vh",color:"#0f172a"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)",color:"#fff",padding:"20px 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
          <div style={{minWidth:0,flex:"1 1 auto"}}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"#94a3b8",marginBottom:4}}>{tui("subtitle")}</div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>{tui("title")}</div>
            <div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>FY2023 – FY2025 · {tui("desc")} · {SUBS.length}{tui("subs_count")} · {RAW.indicators.length}{tui("inds_count")} · v54 (2026-04-29)</div>
          </div>
          <div style={{display:"flex",gap:2,borderRadius:6,overflow:"visible",border:"1px solid #475569",flexShrink:0}}>
            {["ko","en","zh"].map(l=>(
              <button key={l} onClick={()=>setLang(l)} style={{padding:"6px 12px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:lang===l?"#fff":"transparent",color:lang===l?"#0f172a":"#94a3b8"}}>
                {l==="ko"?"KR":l==="en"?"EN":"CN"}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:"16px 24px"}}>
        {/* View mode toggle */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #cbd5e1"}}>
            {[["bySub",tui("bySub")],["byIndicator",tui("byIndicator")]].map(([m,l])=>(
              <button key={m} onClick={()=>setViewMode(m)} style={{padding:"8px 16px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:viewMode===m?"#1e293b":"#fff",color:viewMode===m?"#fff":"#64748b",transition:"all .15s"}}>{l}</button>
            ))}
          </div>
          {viewMode==="bySub" && (
            <>
              <select value={selSub} onChange={e=>setSelSub(e.target.value)} style={{padding:"8px 12px",borderRadius:6,border:"1px solid #cbd5e1",fontSize:13,fontWeight:600,background:"#fff"}}>
                <optgroup label={tui("domestic")}>{RAW.domestic.map(s=><option key={s} value={s}>{t("sub",s)}</option>)}</optgroup>
                <optgroup label={tui("overseas")}>{RAW.overseas.map(s=><option key={s} value={s}>{t("sub",s)}</option>)}</optgroup>
              </select>
              <div style={{display:"flex",borderRadius:6,overflow:"hidden",border:"1px solid #cbd5e1"}}>
                {[["all",tui("all")],["missing",tui("missing")],["anomaly",tui("anomaly")],["na","N/A"]].map(([m,l])=>(
                  <button key={m} onClick={()=>setFilterMode(m)} style={{padding:"6px 14px",fontSize:12,fontWeight:500,border:"none",cursor:"pointer",background:filterMode===m?"#475569":"#fff",color:filterMode===m?"#fff":"#64748b"}}>{l}</button>
                ))}
              </div>
            </>
          )}
        </div>

        {/* Category tabs */}
        <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>setSelCat("전체")} style={{padding:"5px 12px",borderRadius:16,border:selCat==="전체"?"2px solid #1e293b":"1px solid #e2e8f0",background:selCat==="전체"?"#1e293b":"#fff",color:selCat==="전체"?"#fff":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>{tui("all")}</button>
          {CATS.map(c=>(
            <button key={c} onClick={()=>setSelCat(c)} style={{padding:"5px 12px",borderRadius:16,border:selCat===c?"2px solid #1e293b":"1px solid #e2e8f0",background:selCat===c?"#1e293b":"#fff",color:selCat===c?"#fff":"#64748b",fontSize:11,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap"}}>{t("cat",c.trim())}</button>
          ))}
        </div>

        <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:11,color:"#64748b",fontWeight:600,marginRight:4}} title={tui("hqTooltip")}>{tui("tier")}:</span>
          <button onClick={()=>setTierFilter("all")} style={{padding:"4px 10px",borderRadius:14,border:tierFilter==="all"?"2px solid #6366f1":"1px solid #e2e8f0",background:tierFilter==="all"?"#6366f1":"#fff",color:tierFilter==="all"?"#fff":"#64748b",fontSize:11,fontWeight:600,cursor:"pointer"}}>{tui("tierAll")}</button>
          <button onClick={()=>setTierFilter("HQ_MANAGED")} title={tui("hqTooltip")} style={{padding:"4px 10px",borderRadius:14,border:tierFilter==="HQ_MANAGED"?"2px solid #6366f1":"1px solid #e2e8f0",background:tierFilter==="HQ_MANAGED"?"#6366f1":"#fff",color:tierFilter==="HQ_MANAGED"?"#fff":"#64748b",fontSize:11,fontWeight:600,cursor:"pointer"}}>{tui("tierHQ")}</button>
          <button onClick={()=>setTierFilter("SUBSIDIARY")} style={{padding:"4px 10px",borderRadius:14,border:tierFilter==="SUBSIDIARY"?"2px solid #6366f1":"1px solid #e2e8f0",background:tierFilter==="SUBSIDIARY"?"#6366f1":"#fff",color:tierFilter==="SUBSIDIARY"?"#fff":"#64748b",fontSize:11,fontWeight:600,cursor:"pointer"}}>{tui("tierSub")}</button>
        </div>

        {/* KPI cards (bySub mode) */}
        {viewMode==="bySub" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
            {[
              {label:tui("total"),value:stats.total,color:"#3b82f6",icon:"📊"},
              {label:tui("filled"),value:stats.filled,color:"#22c55e",icon:"✅",sub:`${stats.pct}%`},
              {label:tui("missing25"),value:stats.missing,color:"#f59e0b",icon:"⚠️"},
              {label:tui("yoyAnomaly"),value:stats.anomaly,color:"#ef4444",icon:"🔴"},
            ].map(({label,value,color,icon,sub})=>(
              <div key={label} style={{background:"#fff",borderRadius:10,padding:"14px 16px",borderLeft:`4px solid ${color}`,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                <div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{icon} {label}</div>
                <div style={{fontSize:26,fontWeight:800,color,marginTop:2,fontVariantNumeric:"tabular-nums"}}>{value}{sub && <span style={{fontSize:13,fontWeight:500,color:"#64748b",marginLeft:4}}>{sub}</span>}</div>
              </div>
            ))}
          </div>
        )}

        {/* Legend */}
        <div style={{display:"flex",gap:16,marginBottom:12,fontSize:11,color:"#64748b",flexWrap:"wrap"}}>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#ecfdf5",border:"1px solid #bbf7d0",verticalAlign:"middle",marginRight:4}}/>{tui("normal")}</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#fef3c7",border:"1px solid #fde68a",verticalAlign:"middle",marginRight:4}}/>{tui("missing25")}</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#fee2e2",border:"1px solid #fecaca",verticalAlign:"middle",marginRight:4}}/>YoY ±30%</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#f1f5f9",border:"1px solid #e2e8f0",verticalAlign:"middle",marginRight:4}}/>N/A</span>
        </div>

        {/* Table */}
        <div style={{background:"#fff",borderRadius:12,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",maxHeight:"calc(100vh - 340px)"}}>
          {viewMode==="bySub" ? renderBySubTable() : renderByIndicatorTable()}
        </div>

        <div style={{marginTop:12,fontSize:11,color:"#94a3b8",textAlign:"center"}}>
          {viewMode==="bySub" ? `${t("sub",selSub)}: ${filteredIndicators.length}${tui("showing")}` : `${SUBS.filter(s=>RAW.indicators[selIndicator]?.data[s]?.some(v=>v!=null)).length}${tui('subsHaveData')}`}
        </div>
      </div>
      {manualLabel && <ManualPanel label={manualLabel} lang={lang} onClose={()=>{setManualLabel(null);}}/>}
      {verifPanel && <VerificationPanel sub={verifPanel.sub} label={verifPanel.label} lang={lang} onClose={()=>setVerifPanel(null)}/>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
</script>
</body>
</html>
