  "주해스판:일반대기오염물질 > 질소산화물(NOx)": {ko:"설명 수용 (25년 RTO 신규 배출구 도입, 정제 진공펌프 폐가스를 보일러 소각→RTO 소각으로 전환. 효율 개선으로 NOx 배출 감소, 공정 개선 근거 타당)",en:"Explanation accepted (new RTO stack added in 2025, purification vacuum pump exhaust switched from boiler to RTO incineration. NOx reduction due to efficiency improvement)",zh:"采纳说明（2025年新增RTO废气处理排放口，精制真空泵废气由锅炉焚烧改为RTO焚烧。效率提升导致NOx排放下降，工艺改进依据合理）"},

  "주해스판:수질오염물질 배출량 > SS": {ko:"설명 수용 (폐수 연간 통계는 반기 1회 위탁측정 보고서 2건으로 산출. 측정 주기 특성상 연간 변동성 큼)",en:"Explanation accepted (annual wastewater stats calculated from 2 semi-annual outsourced monitoring reports. Variability inherent to measurement frequency)",zh:"采纳说明（废水年度统计基于半年1次委外监测报告共2份汇总。测量频次特性导致年度波动较大）"},

    "브라질스판:일반대기오염물질 > 질소산화물(NOx)": {ko:"2025 YoY +39% 사유 확인 완료 — 법인 설명: 연료 효율 증가로 연소온도 상승, 공기 중 질소의 NOx 전환량 증가. CO 감소와 반비례 관계 확인 (2023→2024 변동은 보일러 대수 차이)",en:"2025 YoY +39% explained — Higher fuel efficiency raised combustion temperature, increasing atmospheric nitrogen conversion to NOx. Inversely correlated with CO decrease. (2023→2024 variance due to boiler count change)",zh:"2025同比+39%原因确认——燃烧效率提高导致燃烧温度升高，空气中氮转化为NOx的量增加。与CO排放减少呈反比关系（2023→2024差异系锅炉台数变化）"},
    "브라질스판:화학물질 배출량": {ko:"2025 신규 발생 확인 완료 — 법인 확인: VOCs 외 다른 화학물질 배출 없음, 화학물질 배출량 = VOCs 배출량(0.341 ton)과 동일",en:"2025 new emission confirmed — Subsidiary confirmed: no chemical emissions other than VOCs. Chemical emissions = VOCs emissions (0.341 ton)",zh:"2025新增排放确认——法人确认：除VOCs外无其他化学物质排放，化学物质排放量=VOCs排放量(0.341吨)"},
    "브라질스판:휘발성유기화학물질(VOCs)": {ko:"증빙 확인 완료 (0.341 ton, W/S B2 단일 배출원 6.9mg/Nm³. 2024년 4.8은 이상 고점, 2025년은 2023년 0.31 수준 복귀. 산출표+측정보고서 대조)",en:"Verified (0.341 ton, single source W/S B2 at 6.9mg/Nm³. 2024 4.8 was anomalous peak; 2025 returned to 2023 level 0.31. Calc sheet + measurement reports cross-checked)",zh:"证据确认完毕（0.341吨，唯一排放源W/S B2浓度6.9mg/Nm³。2024年4.8为异常高点，2025年回归2023年0.31水平。计算表+监测报告交叉核对）"},

function isVerified(sub, label) { const v = VERIFIED[sub+":"+label]; return v ? v : null; }
function isNA(sub, label) { const v = NOT_APPLICABLE[sub+":"+label]; return v ? v : null; }
function effectiveFlags(sub, label, data) {
  if (isNA(sub, label)) return ["na"];
  const flags = cellStatus(data);
  if (isVerified(sub, label)) return flags.filter(f => f !== "yoy_25" && f !== "yoy_24");
  return flags;
}

const YOY_THRESHOLD = 0.3;

function fmt(v) {
  if (v === null || v === undefined) return null;
  if (Number.isInteger(v)) return v.toLocaleString();
  if (Math.abs(v) < 0.0001 && v !== 0) return v.toExponential(2);
  if (Math.abs(v) < 1) return v.toFixed(4);
  if (Math.abs(v) < 100) return v.toFixed(2);
  const s = v.toString();
  const dotIdx = s.indexOf('.');
  if (dotIdx === -1) return v.toLocaleString();
  const decimals = Math.min(s.length - dotIdx - 1, 6);
  return v.toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}

function yoyPct(prev, cur) {
  if (prev == null || cur == null) return null;
  if (prev === 0 && cur === 0) return 0;
  if (prev === 0) return cur > 0 ? 999 : -999;
  return (cur - prev) / Math.abs(prev);
}

function cellStatus(vals) {
  const [y23, y24, y25] = vals;
  const flags = [];
  // Missing 2025 when historical exists
  const hasHist = y23 != null || y24 != null;
  if (y25 == null && hasHist) flags.push("missing_2025");
  if (y25 == null && !hasHist) flags.push("no_data");
  // YoY anomalies (reporting year vs prior year only)
  const chg25 = yoyPct(y24, y25);
  if (chg25 != null && Math.abs(chg25) > YOY_THRESHOLD) flags.push("yoy_25");
  return flags;
}

function Sparkline({ vals }) {
  const valid = vals.map((v,i)=>v!=null?{v,i}:null).filter(Boolean);
  if (valid.length < 2) return <span style={{color:"#999",fontSize:10}}>—</span>;
  const mn = Math.min(...valid.map(d=>d.v));
  const mx = Math.max(...valid.map(d=>d.v));
  const range = mx-mn || 1;
  const pts = valid.map(d=>`${8+d.i*20},${30-((d.v-mn)/range)*24}`).join(" ");
  return <svg width="56" height="34" style={{verticalAlign:"middle"}}><polyline points={pts} fill="none" stroke="#6366f1" strokeWidth="2"/>{valid.map(d=><circle key={d.i} cx={8+d.i*20} cy={30-((d.v-mn)/range)*24} r="2.5" fill="#6366f1"/>)}</svg>;
}

            <th style={{padding:"10px 12px",textAlign:"left",minWidth:200,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("indicator")}</th>
            <th style={{padding:"10px 8px",textAlign:"center",width:50,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("unit")}</th>
            <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2023</th>
            <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2024</th>
            <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2025</th>
            <th style={{padding:"10px 8px",textAlign:"center",width:65,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("trend")}</th>
            <th style={{padding:"10px 8px",textAlign:"center",width:70,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>YoY%</th>
            <th style={{padding:"10px 8px",textAlign:"center",width:60,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("status")}</th>
          </tr>
        </thead>
        <tbody>
          {filteredIndicators.map((ind, idx) => {
            const d = ind.data[selSub] || [null,null,null];
            const flags = effectiveFlags(selSub, ind.label, d);
            const chg = yoyPct(d[1], d[2]);
            const vNote = isVerified(selSub, ind.label);
            const naNote = isNA(selSub, ind.label);
            const isNARow = flags.includes("na");
            return (
              <tr key={idx} style={{background: bgColor(flags), borderBottom:"1px solid #e2e8f0",transition:"background .15s"}}
                onMouseEnter={e=>e.currentTarget.style.background=isNARow?bgColor(flags):"#f1f5f9"}
                onMouseLeave={e=>e.currentTarget.style.background=bgColor(flags)}>
                <td style={{padding:"8px 12px",color:isNARow?"#94a3b8":"#64748b",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{t("cat",ind.cat)}</td>
                <td style={{padding:"8px 6px",textAlign:"center",fontSize:11,fontWeight:700,color:isNARow?"#94a3b8":"#6366f1",fontVariantNumeric:"tabular-nums",fontFamily:"monospace"}}>{getRow(ind.label) || "—"}</td>
                <td style={{padding:"8px 12px",fontWeight:500,color:isNARow?"#94a3b8":"#0f172a",cursor:isNARow?"help":"default"}} title={tNote(naNote)}>{t("label",ind.label)}{getManual(ind.label) && <button onClick={()=>setManualLabel(ind.label)} style={{border:"none",background:"none",cursor:"pointer",fontSize:12,marginLeft:4,padding:"0 2px",color:"#6366f1",verticalAlign:"middle"}} title={lang==="ko"?"집계 기준 매뉴얼":lang==="en"?"Reporting Manual":"集计标准手册"}>📖</button>}</td>
                <td style={{padding:"8px",textAlign:"center",color:"#94a3b8",fontSize:11}}>{t("unit",ind.unit)}</td>
                <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[0]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[0]!=null?fmt(d[0]):"—"}</td>
                <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[1]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[1]!=null?fmt(d[1]):"—"}</td>
                <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",fontWeight:isNARow?400:600,color:isNARow?"#cbd5e1":d[2]==null?(flags.includes("missing_2025")?"#ef4444":"#cbd5e1"):"#0f172a"}}>{isNARow?"—":d[2]!=null?fmt(d[2]):flags.includes("missing_2025")?<span style={{color:"#ef4444",fontWeight:400}}>{tui("notEntered")}</span>:"—"}</td>
                <td style={{padding:"4px 8px",textAlign:"center"}}>{isNARow?<span style={{color:"#cbd5e1",fontSize:10}}>—</span>:<Sparkline vals={d}/>}</td>
                <td style={{padding:"8px",textAlign:"center",fontSize:12,fontWeight:600,color:isNARow?"#cbd5e1":chg==null?"#94a3b8":(Math.abs(chg)>YOY_THRESHOLD&&!vNote)?"#dc2626":"#16a34a"}}>
                  {isNARow?"—":chg!=null ? (chg>=0?"+":"") + (chg*100).toFixed(0)+"%" : "—"}
                </td>
                <td style={{padding:"8px",textAlign:"center"}} title={tNote(naNote||vNote)}>
                  {isNARow && <span title={tNote(naNote)} style={{color:"#94a3b8",fontSize:13,cursor:"help"}}>─</span>}
                  {!isNARow && flags.includes("missing_2025") && <span title={tui("missing25")} style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#fbbf24",color:"#fff",fontSize:11,fontWeight:700}}>!</span>}
                  {!isNARow && (flags.includes("yoy_24")||flags.includes("yoy_25")) && <span title={tui("yoyAnomaly")} style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#ef4444",color:"#fff",fontSize:11,fontWeight:700,marginLeft:2}}>⚠</span>}
                  {!isNARow && !flags.includes("missing_2025") && !flags.includes("yoy_24") && !flags.includes("yoy_25") && <span title={tNote(vNote)} style={{color:"#22c55e",fontSize:14,cursor:vNote?"help":"default"}}>✓</span>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
  );

  const renderByIndicatorTable = () => {
    const ind = RAW.indicators[selIndicator];
    if (!ind) return null;
    const subsWithData = SUBS.filter(s => ind.data[s] && ind.data[s].some(v => v != null));
    return (
      <div>
        <div style={{marginBottom:12}}>
          <select value={selIndicator} onChange={e=>setSelIndicator(+e.target.value)}
            style={{padding:"8px 12px",borderRadius:6,border:"1px solid #cbd5e1",fontSize:13,width:"100%",background:"#fff"}}>
            {RAW.indicators.map((ind,i) => <option key={i} value={i}>{getRow(ind.label) ? `${tui("row")}${getRow(ind.label)} ` : ""}[{t("cat",ind.cat)}] {t("label",ind.label)} ({t("unit",ind.unit)})</option>)}
          </select>
        </div>
        {getManual(ind.label) && <div style={{marginBottom:10,padding:"6px 12px",background:"#f5f3ff",border:"1px solid #c4b5fd",borderRadius:6,fontSize:11,color:"#5b21b6",cursor:"pointer"}} onClick={()=>setManualLabel(ind.label)}>📖 {lang==="ko"?"집계 기준 매뉴얼 보기":lang==="en"?"View Reporting Manual":"查看集计标准手册"}</div>}
        <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:13,fontFamily:"'Pretendard','Noto Sans KR',sans-serif"}}>
          <thead>
            <tr style={{background:"#1e293b",color:"#fff"}}>
              <th style={{padding:"10px 12px",textAlign:"left",position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("sub")}</th>
              <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2023</th>
              <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2024</th>
              <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2025</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:65,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("trend")}</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:80,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>YoY 24→25</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:60,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("status")}</th>
            </tr>
          </thead>
          <tbody>
            {subsWithData.map(sub => {
              const d = ind.data[sub];
              const flags = effectiveFlags(sub, ind.label, d);
              const chg = yoyPct(d[1], d[2]);
              const isDom = RAW.domestic.includes(sub);
              const vNote = isVerified(sub, ind.label);
              const naNote = isNA(sub, ind.label);
              const isNARow = flags.includes("na");
              return (
                <tr key={sub} style={{background: bgColor(flags),borderBottom:"1px solid #e2e8f0"}}>
                  <td style={{padding:"8px 12px",fontWeight:500,color:isNARow?"#94a3b8":"#0f172a",cursor:isNARow?"help":"default"}} title={tNote(naNote)}>
                    <span style={{display:"inline-block",width:6,height:6,borderRadius:3,background:isDom?"#3b82f6":"#f59e0b",marginRight:6}}/>
                    {t("sub",sub)}
                  </td>
                  <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[0]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[0]!=null?fmt(d[0]):"—"}</td>
                  <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[1]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[1]!=null?fmt(d[1]):"—"}</td>
                  <td style={{padding:"8px",textAlign:"right",fontWeight:isNARow?400:600,color:isNARow?"#cbd5e1":d[2]==null?(flags.includes("missing_2025")?"#ef4444":"#cbd5e1"):"#0f172a"}}>{isNARow?"—":d[2]!=null?fmt(d[2]):flags.includes("missing_2025")?<span style={{color:"#ef4444",fontWeight:400}}>{tui("notEntered")}</span>:"—"}</td>
                  <td style={{padding:"4px 8px",textAlign:"center"}}>{isNARow?<span style={{color:"#cbd5e1",fontSize:10}}>—</span>:<Sparkline vals={d}/>}</td>
                  <td style={{padding:"8px",textAlign:"center",fontSize:12,fontWeight:600,color:isNARow?"#cbd5e1":chg==null?"#94a3b8":(Math.abs(chg)>YOY_THRESHOLD&&!vNote)?"#dc2626":"#16a34a"}}>
                    {isNARow?"—":chg!=null?(chg>=0?"+":"")+(chg*100).toFixed(0)+"%":"—"}
                  </td>
                  <td style={{padding:"8px",textAlign:"center"}} title={tNote(naNote||vNote)}>
                    {isNARow && <span title={tNote(naNote)} style={{color:"#94a3b8",fontSize:13,cursor:"help"}}>─</span>}
                    {!isNARow && flags.includes("missing_2025") && <span style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#fbbf24",color:"#fff",fontSize:11,fontWeight:700}}>!</span>}
                    {!isNARow && (flags.includes("yoy_24")||flags.includes("yoy_25")) && <span style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#ef4444",color:"#fff",fontSize:11,fontWeight:700,marginLeft:2}}>⚠</span>}
                    {!isNARow && !flags.includes("missing_2025") && !flags.includes("yoy_24") && !flags.includes("yoy_25") && <span title={tNote(vNote)} style={{color:"#22c55e",fontSize:14,cursor:vNote?"help":"default"}}>✓</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  };

  return (
    <div style={{fontFamily:"'Pretendard','Noto Sans KR',system-ui,sans-serif",background:"#f8fafc",minHeight:"100vh",color:"#0f172a"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)",color:"#fff",padding:"20px 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
          <div style={{minWidth:0,flex:"1 1 auto"}}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"#94a3b8",marginBottom:4}}>{tui("subtitle")}</div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>{tui("title")}</div>
            <div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>FY2023 – FY2025 · {tui("desc")} · {SUBS.length}{tui("subs_count")} · {RAW.indicators.length}{tui("inds_count")}</div>
          </div>
          <div style={{display:"flex",gap:2,borderRadius:6,overflow:"visible",border:"1px solid #475569",flexShrink:0}}>
            {["ko","en","zh"].map(l=>(
              <button key={l} onClick={()=>setLang(l)} style={{padding:"6px 12px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:lang===l?"#fff":"transparent",color:lang===l?"#0f172a":"#94a3b8"}}>
                {l==="ko"?"KR":l==="en"?"EN":"CN"}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:"16px 24px"}}>
        {/* View mode toggle */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #cbd5e1"}}>
            {[["bySub",tui("bySub")],["byIndicator",tui("byIndicator")]].map(([m,l])=>(
              <button key={m} onClick={()=>setViewMode(m)} style={{padding:"8px 16px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:viewMode===m?"#1e293b":"#fff",color:viewMode===m?"#fff":"#64748b",transition:"all .15s"}}>{l}</button>
            ))}
          </div>
          {viewMode==="bySub" && (
            <>
              <select value={selSub} onChange={e=>setSelSub(e.target.value)} style={{padding:"8px 12px",borderRadius:6,border:"1px solid #cbd5e1",fontSize:13,fontWeight:600,background:"#fff"}}>
                <optgroup label={tui("domestic")}>{RAW.domestic.map(s=><option key={s} value={s}>{t("sub",s)}</option>)}</optgroup>
                <optgroup label={tui("overseas")}>{RAW.overseas.map(s=><option key={s} value={s}>{t("sub",s)}</option>)}</optgroup>
              </select>
              <div style={{display:"flex",borderRadius:6,overflow:"hidden",border:"1px solid #cbd5e1"}}>
                {[["all",tui("all")],["missing",tui("missing")],["anomaly",tui("anomaly")],["na","N/A"]].map(([m,l])=>(
                  <button key={m} onClick={()=>setFilterMode(m)} style={{padding:"6px 14px",fontSize:12,fontWeight:500,border:"none",cursor:"pointer",background:filterMode===m?"#475569":"#fff",color:filterMode===m?"#fff":"#64748b"}}>{l}</button>
                ))}
              </div>
            </>
          )}
        </div>

        {/* Category tabs */}
        <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>setSelCat("전체")} style={{padding:"5px 12px",borderRadius:16,border:selCat==="전체"?"2px solid #1e293b":"1px solid #e2e8f0",background:selCat==="전체"?"#1e293b":"#fff",color:selCat==="전체"?"#fff":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>{tui("all")}</button>
          {CATS.map(c=>(
            <button key={c} onClick={()=>setSelCat(c)} style={{padding:"5px 12px",borderRadius:16,border:selCat===c?"2px solid #1e293b":"1px solid #e2e8f0",background:selCat===c?"#1e293b":"#fff",color:selCat===c?"#fff":"#64748b",fontSize:11,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap"}}>{t("cat",c.trim())}</button>
          ))}
        </div>

        {/* KPI cards (bySub mode) */}
        {viewMode==="bySub" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
            {[
              {label:tui("total"),value:stats.total,color:"#3b82f6",icon:"📊"},
              {label:tui("filled"),value:stats.filled,color:"#22c55e",icon:"✅",sub:`${stats.pct}%`},
              {label:tui("missing25"),value:stats.missing,color:"#f59e0b",icon:"⚠️"},
              {label:tui("yoyAnomaly"),value:stats.anomaly,color:"#ef4444",icon:"🔴"},
            ].map(({label,value,color,icon,sub})=>(
              <div key={label} style={{background:"#fff",borderRadius:10,padding:"14px 16px",borderLeft:`4px solid ${color}`,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                <div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{icon} {label}</div>
                <div style={{fontSize:26,fontWeight:800,color,marginTop:2,fontVariantNumeric:"tabular-nums"}}>{value}{sub && <span style={{fontSize:13,fontWeight:500,color:"#64748b",marginLeft:4}}>{sub}</span>}</div>
              </div>
            ))}
          </div>
        )}

        {/* Legend */}
        <div style={{display:"flex",gap:16,marginBottom:12,fontSize:11,color:"#64748b",flexWrap:"wrap"}}>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#ecfdf5",border:"1px solid #bbf7d0",verticalAlign:"middle",marginRight:4}}/>{tui("normal")}</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#fef3c7",border:"1px solid #fde68a",verticalAlign:"middle",marginRight:4}}/>{tui("missing25")}</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#fee2e2",border:"1px solid #fecaca",verticalAlign:"middle",marginRight:4}}/>YoY ±30%</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#f1f5f9",border:"1px solid #e2e8f0",verticalAlign:"middle",marginRight:4}}/>N/A</span>
        </div>

        {/* Table */}
        <div style={{background:"#fff",borderRadius:12,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",maxHeight:"calc(100vh - 340px)"}}>
          {viewMode==="bySub" ? renderBySubTable() : renderByIndicatorTable()}
        </div>

        <div style={{marginTop:12,fontSize:11,color:"#94a3b8",textAlign:"center"}}>
          {viewMode==="bySub" ? `${t("sub",selSub)}: ${filteredIndicators.length}${tui("showing")}` : `${SUBS.filter(s=>RAW.indicators[selIndicator]?.data[s]?.some(v=>v!=null)).length}${tui('subsHaveData')}`}
        </div>
      </div>
      {manualLabel && <ManualPanel label={manualLabel} lang={lang} onClose={()=>setManualLabel(null)}/>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
</script>
</body>
</html>
