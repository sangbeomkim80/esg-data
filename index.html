function isVerified(sub, label) { const v = VERIFIED[sub+":"+label]; return v ? v : null; }
function isNA(sub, label) { const v = NOT_APPLICABLE[sub+":"+label]; return v ? v : null; }
function effectiveFlags(sub, label, data) {
  if (isNA(sub, label)) return ["na"];
  const flags = cellStatus(data);
  if (isVerified(sub, label)) return flags.filter(f => f !== "yoy_25" && f !== "yoy_24");
  return flags;
}

const YOY_THRESHOLD = 0.3;

function fmt(v) {
  if (v === null || v === undefined) return null;
  if (Number.isInteger(v)) return v.toLocaleString();
  if (Math.abs(v) < 0.0001 && v !== 0) return v.toExponential(2);
  if (Math.abs(v) < 1) return v.toFixed(4);
  if (Math.abs(v) < 100) return v.toFixed(2);
  const s = v.toString();
  const dotIdx = s.indexOf('.');
  if (dotIdx === -1) return v.toLocaleString();
  const decimals = Math.min(s.length - dotIdx - 1, 6);
  return v.toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}

function yoyPct(prev, cur) {
  if (prev == null || cur == null) return null;
  if (prev === 0 && cur === 0) return 0;
  if (prev === 0) return cur > 0 ? 999 : -999;
  return (cur - prev) / Math.abs(prev);
}

function cellStatus(vals) {
  const [y23, y24, y25] = vals;
  const flags = [];
  // Missing 2025 when historical exists
  const hasHist = y23 != null || y24 != null;
  if (y25 == null && hasHist) flags.push("missing_2025");
  if (y25 == null && !hasHist) flags.push("no_data");
  // YoY anomalies (reporting year vs prior year only)
  const chg25 = yoyPct(y24, y25);
  if (chg25 != null && Math.abs(chg25) > YOY_THRESHOLD) flags.push("yoy_25");
  return flags;
}

function Sparkline({ vals }) {
  const valid = vals.map((v,i)=>v!=null?{v,i}:null).filter(Boolean);
  if (valid.length < 2) return <span style={{color:"#999",fontSize:10}}>—</span>;
  const mn = Math.min(...valid.map(d=>d.v));
  const mx = Math.max(...valid.map(d=>d.v));
  const range = mx-mn || 1;
  const pts = valid.map(d=>`${8+d.i*20},${30-((d.v-mn)/range)*24}`).join(" ");
  return <svg width="56" height="34" style={{verticalAlign:"middle"}}><polyline points={pts} fill="none" stroke="#6366f1" strokeWidth="2"/>{valid.map(d=><circle key={d.i} cx={8+d.i*20} cy={30-((d.v-mn)/range)*24} r="2.5" fill="#6366f1"/>)}</svg>;
}

          )}
        </div>

        {/* Category tabs */}
        <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>setSelCat("전체")} style={{padding:"5px 12px",borderRadius:16,border:selCat==="전체"?"2px solid #1e293b":"1px solid #e2e8f0",background:selCat==="전체"?"#1e293b":"#fff",color:selCat==="전체"?"#fff":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>{tui("all")}</button>
          {CATS.map(c=>(
            <button key={c} onClick={()=>setSelCat(c)} style={{padding:"5px 12px",borderRadius:16,border:selCat===c?"2px solid #1e293b":"1px solid #e2e8f0",background:selCat===c?"#1e293b":"#fff",color:selCat===c?"#fff":"#64748b",fontSize:11,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap"}}>{t("cat",c.trim())}</button>
          ))}
        </div>

        {/* KPI cards (bySub mode) */}
        {viewMode==="bySub" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
            {[
              {label:tui("total"),value:stats.total,color:"#3b82f6",icon:"📊"},
              {label:tui("filled"),value:stats.filled,color:"#22c55e",icon:"✅",sub:`${stats.pct}%`},
              {label:tui("missing25"),value:stats.missing,color:"#f59e0b",icon:"⚠️"},
              {label:tui("yoyAnomaly"),value:stats.anomaly,color:"#ef4444",icon:"🔴"},
            ].map(({label,value,color,icon,sub})=>(
              <div key={label} style={{background:"#fff",borderRadius:10,padding:"14px 16px",borderLeft:`4px solid ${color}`,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                <div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{icon} {label}</div>
                <div style={{fontSize:26,fontWeight:800,color,marginTop:2,fontVariantNumeric:"tabular-nums"}}>{value}{sub && <span style={{fontSize:13,fontWeight:500,color:"#64748b",marginLeft:4}}>{sub}</span>}</div>
              </div>
            ))}
          </div>
        )}

        {/* Legend */}
        <div style={{display:"flex",gap:16,marginBottom:12,fontSize:11,color:"#64748b",flexWrap:"wrap"}}>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#ecfdf5",border:"1px solid #bbf7d0",verticalAlign:"middle",marginRight:4}}/>{tui("normal")}</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#fef3c7",border:"1px solid #fde68a",verticalAlign:"middle",marginRight:4}}/>{tui("missing25")}</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#fee2e2",border:"1px solid #fecaca",verticalAlign:"middle",marginRight:4}}/>YoY ±30%</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#f1f5f9",border:"1px solid #e2e8f0",verticalAlign:"middle",marginRight:4}}/>N/A</span>
        </div>

        {/* Table */}
        <div style={{background:"#fff",borderRadius:12,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",maxHeight:"calc(100vh - 340px)"}}>
          {viewMode==="bySub" ? renderBySubTable() : renderByIndicatorTable()}
        </div>

        <div style={{marginTop:12,fontSize:11,color:"#94a3b8",textAlign:"center"}}>
          {viewMode==="bySub" ? `${t("sub",selSub)}: ${filteredIndicators.length}${tui("showing")}` : `${SUBS.filter(s=>RAW.indicators[selIndicator]?.data[s]?.some(v=>v!=null)).length}${tui('subsHaveData')}`}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
</script>
</body>
</html>
