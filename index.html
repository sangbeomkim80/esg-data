    cutoff:{ko:"보고연도 1.1–12.31 입고 수량 (재고수불부 기준, KG 단위)",en:"Receipt qty during Jan 1 – Dec 31 (per inventory ledger, KG unit)",zh:"报告年度1.1–12.31入库数量（按库存收发簿，KG单位）"},
    evidence:{ko:"재고수불부 Raw 시트 × GHS 8차 마스터 리스트 140종 CAS 교차 대조. 추출 조건: ① 평가클래스 = 3000(원재료) + 3010(부재료) + 5000(저장품 중 화학물질), ② 단위 = KG, ③ 입고(수량) 컬럼 합산. 자재명 첫 단어로 1차 매칭 후 CAS 확정",en:"Inventory ledger Raw sheet × GHS Rev.8 master list (140 substances) cross-checked by CAS. Extraction: ① Valuation Class 3000(raw)+3010(sub)+5000(consumable chemicals), ② Unit=KG, ③ sum 입고(수량) column. First-word match on material name then CAS confirmation",zh:"库存收发簿Raw表 × GHS第8版主列表140种物质按CAS交叉核对。提取条件：① 估价类别=3000(原材料)+3010(辅材料)+5000(消耗品中化学物质)，② 单位=KG，③ 入库(数量)列汇总。物料名称首词匹配后确认CAS"},
    standardMapping:{ko:"표준 매핑 키워드 9종 (FY2025 통일 적용): MDI*→101-68-8 / DMAC*·DMA→127-19-5(DMAc) / EDA*→107-15-3(에틸렌디아민) / DEAM*→111-42-2(Diethanolamine, 광동스판 한정) / DEA*→109-89-7(Diethylamine) / DETA→111-40-0 / PDA→78-90-0(1,2-Propylenediamine) / 盐酸·HCl→7647-01-0 / 液碱·苛性钠·NaOH→1310-73-2",en:"Standard mapping keywords (9, FY2025 unified): MDI*→101-68-8 / DMAC*·DMA→127-19-5 / EDA*→107-15-3 / DEAM*→111-42-2 (Guangdong only) / DEA*→109-89-7 / DETA→111-40-0 / PDA→78-90-0 / HCl→7647-01-0 / NaOH→1310-73-2",zh:"标准映射关键词9种（FY2025统一适用）：MDI*→101-68-8 / DMAC*·DMA→127-19-5 / EDA*→107-15-3 / DEAM*→111-42-2（仅广东）/ DEA*→109-89-7 / DETA→111-40-0 / PDA→78-90-0 / 盐酸·HCl→7647-01-0 / 液碱·苛性钠·NaOH→1310-73-2"},
    decisionTree:{ko:"① 재고수불부 Raw에서 법인·평가클래스(3000/3010/5000)·KG 필터 → ② 자재명 첫 단어(언더바·공백 분할) 추출 → ③ 표준 매핑 키워드 9종과 대조 → ④ 매칭 시 CAS 확정 → ⑤ GHS 마스터 140종 검증 → ⑥ 입고수량 합산 (kg→ton 환산). 연도 간 포함 물질 범위 일관 유지 필수. 신규 자재 출현 시 표준 매핑 보강",en:"① Filter inventory Raw by entity·VC(3000/3010/5000)·KG → ② Extract first word from material name (split by underscore/space) → ③ Match against 9 standard keywords → ④ Confirm CAS → ⑤ Verify against GHS 140 master list → ⑥ Sum receipt qty (kg→ton). Maintain consistent substance scope across years. Update mapping when new materials appear",zh:"① 库存Raw按法人·估价类别(3000/3010/5000)·KG筛选 → ② 提取物料名称首词（按下划线/空格分割）→ ③ 与9种标准关键词比对 → ④ 确认CAS → ⑤ 与GHS主列表140种核对 → ⑥ 入库数量汇总（kg→吨）。各年度涵盖物质范围保持一致。出现新物料时补充映射"},
    gri:{ko:"GRI 2016 자체 지표 (UN GHS Rev.8 기준)",en:"Custom indicator (UN GHS Rev.8 basis)",zh:"自定义指标（联合国GHS第8修订版标准）"},

  "주해스판:지정 폐기물 배출량 > 위탁처리 > 기타": {ko:"삭제 처리 (102.875 ton S02 보관분 제외. GRI 306-5 처리 실적 지표 정의상 연내 미처리 재고는 처리 실적에서 제외, 법인 회신 반영)",en:"Removed (102.875 ton S02 stored stock excluded. Per GRI 306-5 treatment performance scope—unprocessed stock excluded from actuals, per entity reply)",zh:"已删除（102.875吨S02仓储库存已排除。根据GRI 306-5处置绩效指标定义，年内未处置库存不计入处置实绩，采纳法人回复）"},
  "주해스판:구매 > 총 제품 구매 실적": {ko:"3개년 재산출 확정 (통일 방법론). 재고수불부(VC 3000+3010+4000) 구매입고(금액). 2023: 276.6M→299.3M / 2024: 242.8M→235.8M / 2025: 212.6M(유지). CNY. YoY -9.9%",en:"Three-year recalculation (unified). Inventory ledger VC 3000+3010+4000. CNY. YoY -9.9%",zh:"三年度重新测算（统一方法论）。库存收发簿VC 3000+3010+4000。CNY。同比-9.9%"},
  "주해스판:포장재 > 포장재 총 출하량": {ko:"확정 (18,828,105 EA, 본사 SAP 일괄 추출. 단위는 EA이나 대시보드 표기는 Ton—전 법인 공통 이슈, 추후 환산 예정)",en:"Confirmed (18,828,105 EA, HQ SAP batch extraction. Unit is EA but dashboard shows Ton—common issue across all entities, conversion pending)",zh:"确定（18,828,105 EA，总部SAP批量提取。单位为EA但仪表板显示为吨——全法人共性问题，将来换算）"},
  "주해스판:비도로 차량 > 전기차": {ko:"확정 (3대, 임대계약서 대조 완료)",en:"Confirmed (3 units, lease contracts verified)",zh:"确定（3台，租赁合同核对完毕）"},

  "주해스판:지정 폐기물 배출량 > 위탁처리 > 재활용(③)": {ko:"과거 데이터 수정 확정 (법인 자백: 200L 공드럼 처치 건, 23년 6.22→198, 24년 88.4→212, 25년 196.88 유지. 정정 후 YoY -7%)",en:"Historical data corrected (entity confirmed: 200L empty drum disposal, 2023 6.22→198, 2024 88.4→212, 2025 196.88 unchanged. YoY -7% after correction)",zh:"历史数据修正确定（法人承认：200L空桶处置项目，2023年6.22→198，2024年88.4→212，2025年196.88不变。修正后YoY为-7%）"},
  "주해스판:일반대기오염물질 > 질소산화물(NOx)": {ko:"설명 수용 (25년 RTO 신규 배출구 도입, 정제 진공펌프 폐가스를 보일러 소각→RTO 소각으로 전환. 효율 개선으로 NOx 배출 감소, 공정 개선 근거 타당)",en:"Explanation accepted (new RTO stack added in 2025, purification vacuum pump exhaust switched from boiler to RTO incineration. NOx reduction due to efficiency improvement)",zh:"采纳说明（2025年新增RTO废气处理排放口，精制真空泵废气由锅炉焚烧改为RTO焚烧。效率提升导致NOx排放下降，工艺改进依据合理）"},
  "주해스판:일반대기오염물질 > 황산화물(SOx)": {ko:"설명 수용 (SO2는 정량하한 부근 변동으로 간헐적 검출. 24년 하한 미만→25년 검출, 측정 한계 특성)",en:"Explanation accepted (SO2 fluctuates near detection limit, intermittent. 2024 below LOD→2025 detected, measurement threshold characteristic)",zh:"采纳说明（SO2在检出限附近波动，时有时无。2024年低于检出限→2025年检出，测量阈值特性）"},
  "주해스판:일반대기오염물질 > 먼지(PM)": {ko:"설명 수용 (RTO 전환으로 PM 배출 감소. 행64 NOx와 동일 공정 개선 배경)",en:"Explanation accepted (PM reduction due to RTO conversion. Same process improvement as Row 64 NOx)",zh:"采纳说明（RTO改造导致PM排放下降。与行64 NOx同一工艺改进背景）"},
  "주해스판:수질오염물질 배출량 > SS": {ko:"설명 수용 (폐수 연간 통계는 반기 1회 위탁측정 보고서 2건으로 산출. 측정 주기 특성상 연간 변동성 큼)",en:"Explanation accepted (annual wastewater stats calculated from 2 semi-annual outsourced monitoring reports. Variability inherent to measurement frequency)",zh:"采纳说明（废水年度统计基于半年1次委外监测报告共2份汇总。测量频次特性导致年度波动较大）"},
  "주해스판:수질오염물질 배출량 > T-N": {ko:"설명 수용 (SS와 동일한 반기 1회 위탁측정 기반. 측정 주기 특성)",en:"Explanation accepted (same semi-annual outsourced monitoring basis as SS. Measurement frequency characteristic)",zh:"采纳说明（与SS同一半年1次委外监测依据。测量频次特性）"},
  "주해스판:유해화학물질 사용량": {ko:"3개년 일괄 재산출 확정 (전 스판 법인 통일 방법론). 재고수불부(VC 3000·3010·5000) × GHS 마스터 140종 CAS 교차 대조. 2023: 3,509.83→3,570.06 / 2024: 3,921.80→3,895.04 / 2025: 0→4,620.64 ton. 주요 물질: MDI(101-68-8) + DMAc(127-19-5, 3社 확대로 YoY +64%) + EDA(107-15-3) + DEA(109-89-7) + PDA(78-90-0) + HCl(7647-01-0) + DETA(111-40-0)",en:"Three-year batch recalculation (unified methodology). Inventory ledger × GHS master list of 140 substances. 2023: 3,509.83→3,570.06 / 2024: 3,921.80→3,895.04 / 2025: 0→4,620.64 ton. Key substances: MDI + DMAc (3 suppliers, +64% YoY) + EDA + DEA + PDA + HCl + DETA",zh:"三年度一并重新测算确定（统一方法论）。库存收发簿 × GHS主列表140种物质按CAS交叉核对。2023: 3,509.83→3,570.06 / 2024: 3,921.80→3,895.04 / 2025: 0→4,620.64吨。主要物质：MDI + DMAc（3家供应商扩大，同比+64%）+ EDA + DEA + PDA + HCl + DETA"},
  "광동스판:유해화학물질 사용량":{ko:{confirmed:"FY2023 8,680.07 ton / FY2024 10,904.59 ton / FY2025 6,883.89 ton",basis:["3개년 일괄 재산출 (전 스판 법인 통일 방법론)","재고수불부 (평가클래스 3000·3010·5000) × GHS 마스터 140종 CAS 교차 대조","FY2025 신규 입력","주요 물질: MDI + DMAc + EDA + DEAM(111-42-2) + DEA + PDA + DETA"],yoy:["FY2024 → FY2025: -36.9% (이상치이나 사실 반영)"],verification:"MDI 6,878 → 4,363 ton, DMAc 3,247 → 1,968 ton 감소 반영 (생산량·수출 변동 추정)"},en:{confirmed:"FY2023 8,680.07 ton / FY2024 10,904.59 ton / FY2025 6,883.89 ton",basis:["Three-year batch recalculation (unified methodology across all spandex subsidiaries)","Inventory ledger (valuation class 3000·3010·5000) × GHS master 140 CAS cross-check","FY2025 new entry","Key substances: MDI + DMAc + EDA + DEAM(111-42-2) + DEA + PDA + DETA"],yoy:["FY2024 → FY2025: -36.9% (anomaly, reflects actual data)"],verification:"Reflects MDI 6,878 → 4,363 ton, DMAc 3,247 → 1,968 ton decrease (production/export variation)"},zh:{confirmed:"FY2023 8,680.07吨 / FY2024 10,904.59吨 / FY2025 6,883.89吨",basis:["三年度一并重新测算（全氨纶法人统一方法论）","库存收发簿（评估类别3000·3010·5000）× GHS主列表140种CAS交叉核对","FY2025新填入","主要物质：MDI + DMAc + EDA + DEAM(111-42-2) + DEA + PDA + DETA"],yoy:["FY2024 → FY2025：-36.9%（异常值但反映实际）"],verification:"反映MDI 6,878 → 4,363吨、DMAc 3,247 → 1,968吨减少（生产量·出口变动推定）"}},
  "닝샤스판:유해화학물질 사용량":{ko:{confirmed:"FY2025 19,239.91 ton (본사 일괄 산출)",basis:["GHS 8차 마스터 리스트 140종 CAS + 표준 매핑 키워드 9종 적용","본사 일괄 산출 정책에 따라 전 법인(닝샤 포함) 동일 기준 적용","PTMG 원료(BDO·THF)는 GHS 마스터 미포함으로 산출 제외","정부탄올(닝샤 FY2025 2 ton, GHS 마스터 R96 포함) 본사 매핑 적용 확인"],yoy:["FY2024 12,647 → FY2025 19,240 (+52.1%, 생산 확대 영향)"],verification:"닝샤 자체 산출값 21,952.62 ton과 차이 +14% 발생은 정책상 정상이며 차이 소명 불필요 (향후에도 본사 일괄 기준으로 지속 산출 예정)"},en:{confirmed:"FY2025 19,239.91 ton (HQ batch calculation)",basis:["GHS 8th master list 140 CAS + 9 standard mapping keywords applied","Per HQ batch calculation policy, all subsidiaries (including Ningxia) same standard","PTMG raw materials (BDO·THF) excluded from calculation as not in GHS master","Confirmed HQ mapping applied for ammonium butanol (Ningxia FY2025 2 ton, GHS master R96 included)"],yoy:["FY2024 12,647 → FY2025 19,240 (+52.1%, production expansion impact)"],verification:"+14% diff vs Ningxia self-calc 21,952.62 ton is policy-normal, no explanation needed (HQ batch standard to be continued)"},zh:{confirmed:"FY2025 19,239.91吨 (总部统一核算)",basis:["GHS第8版主列表140种CAS + 标准映射关键词9种适用","按总部统一核算政策，全法人(含宁夏)同一基准","PTMG原料(BDO·THF)因未列入GHS主列表，从核算中排除","丁醇(宁夏FY2025 2吨，GHS主列表R96含)总部映射适用确认"],yoy:["FY2024 12,647 → FY2025 19,240 (+52.1%，生产扩大影响)"],verification:"与宁夏自核算值21,952.62吨差异+14%属政策上正常，差异说明不必要(今后亦按总部统一基准持续核算)"}},
  "취저우스판:유해화학물질 사용량": {ko:"3개년 일괄 재산출 확정 (전 스판 법인 통일 방법론). 재고수불부(VC 3000·3010·5000) × GHS 마스터 140종 CAS 교차 대조. 2023: 11,434.85→12,338.11 / 2024: 11,614.39→12,492.08 / 2025: 미입력→14,021.57 ton. 2025 신규 입력. YoY +12.2%. 주요 물질: MDI + DMAc + EDA + DEA + DETA + NaOH(2025년 1,381 ton 액碱 30% 포함)",en:"Three-year batch recalculation (unified methodology). 2023: 11,434.85→12,338.11 / 2024: 11,614.39→12,492.08 / 2025: missing→14,021.57 ton. 2025 new entry. YoY +12.2%. Key substances: MDI + DMAc + EDA + DEA + DETA + NaOH (1,381 ton liquid caustic 30% included in 2025)",zh:"三年度一并重新测算确定（统一方法论）。2023: 11,434.85→12,338.11 / 2024: 11,614.39→12,492.08 / 2025: 未填→14,021.57吨。2025新填入。同比+12.2%。主要物质：MDI + DMAc + EDA + DEA + DETA + NaOH（2025年含液碱30% 1,381吨）"},
  "튀르키예스판:유해화학물질 사용량": {ko:"3개년 일괄 재산출 확정 (전 스판 법인 통일 방법론). 재고수불부(VC 3000·3010·5000) × GHS 마스터 140종 CAS 교차 대조. 2023: 7,916.48→7,901.27 / 2024: 8,304.82→8,806.19 / 2025: 미입력→8,167.68 ton. 2025 신규 입력. YoY -7.3%(정상). 주요 물질: MDI + DMAc + EDA + DEA + PDA + DETA",en:"Three-year batch recalculation (unified methodology). 2023: 7,916.48→7,901.27 / 2024: 8,304.82→8,806.19 / 2025: missing→8,167.68 ton. 2025 new entry. YoY -7.3% (normal). Key substances: MDI + DMAc + EDA + DEA + PDA + DETA",zh:"三年度一并重新测算确定（统一方法论）。2023: 7,916.48→7,901.27 / 2024: 8,304.82→8,806.19 / 2025: 未填→8,167.68吨。2025新填入。同比-7.3%（正常）。主要物质：MDI + DMAc + EDA + DEA + PDA + DETA"},
  "동나이:유해화학물질 사용량": {ko:"3개년 전 사업부 검증 완료. 나일론·TC·PET·PTMG 원료에 GHS 9종 해당 물질 없어 전 사업부 = 스판 동일. 2023: 9,139.18 / 2024: 9,406.07(스판, 5월 누락) / 2025: 8,701.30 ton",en:"Three years all divisions verified. Non-spandex materials have no GHS-mapped substances. All-division = spandex-only",zh:"三年度全事业部验证完毕。非氨纶原料无GHS对应物质，全事业部值=氨纶值"},

  "구미:유해화학물질 사용량": {ko:"3개년 재산출 확정 (통일 방법론). 재고수불부(VC 3000·3010·5000) × GHS 마스터 140종 CAS 교차 대조. 2023: 4,537→4,604.25 / 2024: 5,099→4,609.00 / 2025: 미입력→4,105.39 ton. KRW. 주요 물질: MDI(BASF) + DMAc + EDA + PDA + DEA + DEAM + DETA. ※ 스판덱스 사업부(플랜트 1103) 한정, 나일론·폴리에스터·직물 등 타 사업부분 미반영",en:"Three-year recalculation (unified). Inventory ledger × GHS 140 CAS. 2023: 4,537→4,604.25 / 2024: 5,099→4,609.00 / 2025: missing→4,105.39 ton. Key: MDI(BASF)+DMAc+EDA+PDA+DEA+DEAM+DETA. ※ Spandex division (plant 1103) only",zh:"三年度重新测算（统一方法论）。库存收发簿 × GHS 140种CAS。主要物质：MDI(BASF)+DMAc+EDA+PDA+DEA+DEAM+DETA。※ 仅氨纶事业部（工厂1103），尼龙·聚酯·织物等未反映"},

  "가흥화공:환경배출물질 측정비용": {ko:"FY2025 459,433.97 CNY 확정 (세전). 토양·지하수 감측 2건(56,603.78) + 본사 재분류 이관 7건 402,830.19(LDAR Q1-Q4 291,509 + 자행감측 2건 116,981 + 유연감측 1건 2,830). 기존 법인 분류 R100에서 LDAR·자행감측 7건을 R98(측정비용)로 본사 재분류. 1차 확정 56,603.78 대비 +402,830.19",en:"FY2025 459,433.97 CNY confirmed (pre-tax). 2 soil/groundwater monitoring (56,603.78) + 7 items reclassified from R100 to R98 by HQ: LDAR Q1-Q4 (291,509) + self-monitoring 2 (116,981) + cooking oil fume monitoring (2,830). Entity originally classified 7 items under R100; HQ reclassified to R98 as measurement-related",zh:"FY2025 459,433.97 CNY确定（不含税）。土壤·地下水监测2项（56,603.78）+ 总部重新分类从R100转入7项402,830.19（LDAR Q1-Q4 291,509 + 自行监测2项 116,981 + 油烟监测1项 2,830）。法人原将7项分类于R100，总部按测量性质重新分类至R98"},
  "가흥화공:대기·화학물질 및 기타 환경 비용": {ko:"FY2025 22,137.90 CNY 확정 (세전). 기존 424,659.18 중 LDAR·자행감측·유연감측 7건(402,830)은 본사 재분류로 R98(측정비용)로 이관. R100에는 배출권 거래 관련 4건만 유지: 淘宝 VOCs 배출권 수수료 2건(308.90) + 排污权 출양 납부 2건 면세(21,829). 법인 분류 원칙상 배출권 거래는 대기환경 관리 기타 비용, LDAR·감측은 측정비용으로 구분",en:"FY2025 22,137.90 CNY confirmed (pre-tax). Of original 424,659.18, 7 LDAR/self-monitoring/fume items (402,830) reclassified to R98 by HQ. Only 4 emission rights transactions remain under R100: Taobao VOCs permit fees (308.90) + 2 permit transfer payments tax-exempt (21,829). HQ distinguishes emission rights trading as atmospheric mgmt other, vs LDAR/monitoring as measurement",zh:"FY2025 22,137.90 CNY确定（不含税）。原424,659.18中LDAR·自行监测·油烟监测7项（402,830）按总部重新分类转入R98（测量费用）。R100仅保留排污权交易相关4项：淘宝VOCs排污权手续费2项（308.90）+排污权出让纳税2项免税（21,829）。总部分类原则：排污权交易属大气环境管理其他费用，LDAR·监测属测量费用"},

  "가흥화공:유해화학물질 사용량": {ko:"표준 매핑 9종 전환 완료. 가흥화공 주요 원료(BDO·THF)는 GHS 마스터 140종 미포함 → 전 연도 0 ton. 기존값(25.8·32.78 ton)은 부탄올(N-Butyl Alcohol) 등 별도 기준이었으며, 통일 방법론으로 0 전환",en:"Standard mapping 9-keyword conversion. Main materials (BDO/THF) not in GHS master 140 → all years 0 ton. Previous values (25.8/32.78) were based on N-Butyl Alcohol etc., now unified to 0",zh:"标准映射9种关键词转换。主要原料（BDO·THF）不在GHS主列表140种中→全年度0吨。原值（25.8·32.78吨）基于正丁醇等另行标准，统一后为0"},

  "가흥스판:유해화학물질 사용량": {ko:"3개년 일괄 재산출 확정 (전 스판 법인 통일 방법론 적용). 재고수불부(Valuation Class 3000·3010·5000) × GHS 8차 마스터 140종 CAS 교차 대조. 2023: 4.08→3,505.74 / 2024: 5.83→3,966.55 / 2025: 7.33→3,687.31 ton. 기존값(4-7 ton)은 좁은 정의 기반 산출이었으며, 통일 방법론으로 타 스판 법인 수준 회귀. 주요 물질: MDI(101-68-8) + DMAc(127-19-5) + EDA(107-15-3) + PDA(78-90-0) + DEA(109-89-7)",en:"Three-year batch recalculation (unified methodology for all spandex entities). Inventory ledger (VC 3000·3010·5000) × GHS Rev.8 master list of 140 substances cross-checked by CAS. 2023: 4.08→3,505.74 / 2024: 5.83→3,966.55 / 2025: 7.33→3,687.31 ton. Previous values (4-7 ton) were based on narrow definition; unified methodology aligns with peer spandex entities",zh:"三年度一并重新测算确定（全氨纶法人统一方法论）。库存收发簿（估价类别3000·3010·5000）× GHS第8版主列表140种物质按CAS号交叉核对。2023: 4.08→3,505.74 / 2024: 5.83→3,966.55 / 2025: 7.33→3,687.31吨。原值（4-7吨）基于狭义定义，统一方法论后回归至同业氨纶法人水平"},

  "울산:용수 재활용": {ko:"FY2025 중수도 사용량 999,546 m³ (NP원사_PET 단독, NY=0). 용수_사용량_25년_중수도_포함_.xlsx 기준.",en:"FY2025 recycled water 999,546 m³ (NP yarn PET only, NY=0). Source: water usage report incl. recycled water.",zh:"FY2025中水回用量999,546 m³（NP纱PET专用，NY=0）。来源：含中水道用水量报告。"},

  "울산:수질오염물질 배출량 > TOC": {ko:"방류량 201,247 m³ × TOC 8.2 mg/L = 1.650225 ton. 수질측정기록부(2025.12.30) 기준. 템플릿 1.7→1.650225 정밀값 교체.",en:"Discharge 201,247 m³ × TOC 8.2 mg/L = 1.650225 ton. Precise value replacing template 1.7.",zh:"排放量201,247 m³ × TOC 8.2 mg/L = 1.650225吨。精确值替代模板1.7。"},

  "울산:환경오염구제 책임보험": {ko:"환경보험료 실적 25,140,251원 확인 (환경안전팀 비용 계획 대 실적 xlsx, 월별 실적 합산 T&C 배분). 한국 3공장 본사 안내 원칙에 따라 세전(공급가액, 부가세 제외) 기준 적용. 보험료는 부가세 면세 대상이라 세전·세후 동일. 2026-04-21 기준 명시 보강.",en:"Environmental liability insurance KRW 25,140,251 confirmed (Env. Safety team cost plan vs actual, monthly T&C allocation). Pre-tax basis (supply price, excl. VAT) per HQ guidance for 3 Korean plants. Insurance premium is VAT-exempt, so pre/post-tax values are identical. Basis clarified on 2026-04-21.",zh:"环境责任保险25,140,251韩元确认（环境安全组费用计划vs实绩xlsx，按月T&C分摊合计）。按总部对3家韩国工厂的指引，适用税前基准（供应价，不含增值税）。保险费为增值税免税对象，税前·税后一致。2026-04-21基准明示补充。"},
  "울산:ISO 및 기타 환경 인증비용": {ko:"0원 확인. 25년 나이론폴리에스터원사PU ISO 통합갱신심사(한국품질재단, 28,319천원) 비용은 PET본사 30% + PET구미 70% 배분. 울산 미부담. 한국 3공장 본사 안내 원칙에 따라 세전(공급가액, 부가세 제외) 기준 적용. 2026-04-21 기준 명시 보강.",en:"KRW 0 confirmed. FY2025 NP yarn PU ISO renewal audit (KFQ, KRW 28,319K) allocated 30% HQ + 70% Gumi. Ulsan not charged. Pre-tax basis (supply price, excl. VAT) per HQ guidance for 3 Korean plants. Basis clarified on 2026-04-21.",zh:"0韩元确认。25年尼龙聚酯纱PU ISO换证审核（韩国品质财团，28,319千元）费用按PET总部30%+PET龟尾70%分摊，蔚山未承担。按总部对3家韩国工厂的指引，适用税前基准（供应价，不含增值税）。2026-04-21基准明示补充。"},
  "울산:환경개선 시설투자": {ko:"138,938천원 확인. ①종폐장 화학처리장 노후설비 보완 39,938천원(투자준공보고, WBS-019) + ②종폐장 계측기/모니터링 시스템 보완 99,000천원(투자준공보고, WBS-021). 한국 3공장 본사 안내 원칙에 따라 세전(공급가액, 부가세 제외) 기준 적용. 투자준공보고 WBS 금액은 표준적으로 세전 집계. 2026-04-21 기준 명시 보강.",en:"KRW 138,938K confirmed. ①WWTP chem. treatment facility renovation 39,938K (completion rpt WBS-019) + ②WWTP instrumentation/monitoring 99,000K (completion rpt WBS-021). Pre-tax basis (supply price, excl. VAT) per HQ guidance for 3 Korean plants. Investment completion report WBS amounts are aggregated pre-tax by standard. Basis clarified on 2026-04-21.",zh:"138,938千元确认。①终废场化学处理设施陈旧设备修缮39,938千元（投资竣工报告WBS-019）+②终废场仪表及监控系统完善99,000千元（投资竣工报告WBS-021）。按总部对3家韩国工厂的指引，适用税前基准（供应价，不含增值税）。投资竣工报告WBS金额按标准为税前合计。2026-04-21基准明示补充。"}
,
  "울산:폐기물 처리 비용": {ko:"PET 품의서 12개월 합계 120,175,490원 + NY 품의서 1월 6,892,230원 = 127,067,720원. 월별 처리실적 13건(PET 1–12월 + NY 1월) 교차검증 완료. 한국 3공장 본사 안내 원칙에 따라 세전(공급가액, 부가세 제외) 기준 적용. 2026-04-21 기준 명시 보강.",en:"PET invoices 12-month total KRW 120,175,490 + NY invoice Jan KRW 6,892,230 = KRW 127,067,720. Cross-verified with 13 monthly treatment records. Pre-tax basis (supply price, excl. VAT) per HQ guidance for 3 Korean plants. Basis clarified on 2026-04-21.",zh:"PET品议书12个月合计120,175,490韩元+NY品议书1月6,892,230韩元=127,067,720韩元。与13份月度处理实绩交叉验证完毕。按总部对3家韩国工厂的指引，适用税前基准（供应价，不含增值税）。2026-04-21基准明示补充。"}

,
  "구미:일반대기오염물질 > 질소산화물(NOx)":{ko:{confirmed:"FY2024 27.304 ton / FY2025 22.756 ton",basis:["FY2024: 환경정보공개시스템 공시 데이터 (사업장 일련번호 682-85-00866_1)","FY2024 = 자가측정 27.304 ton + TMS 0 ton (TMS 미부착)","FY2025: 자체 대기측정 보고서 기반"],yoy:["FY2023→FY2024: +11.44% (정상)","FY2024→FY2025: -16.7% (정상)"],verification:"정부 공시 YoY +11.4% = 대시보드 FY2023 24.5 역산값 +11.44% 일치 → 데이터 신뢰성 확인",meta:"2026-04-21 FY2024 SEMS 증빙 반영"},en:{confirmed:"FY2024 27.304 ton / FY2025 22.756 ton",basis:["FY2024: Korea Environmental Info Disclosure System (plant ID 682-85-00866_1)","FY2024 = self-measurement 27.304 ton + TMS 0 ton (no TMS installed)","FY2025: based on in-house atmospheric measurement reports"],yoy:["FY2023→FY2024: +11.44% (normal)","FY2024→FY2025: -16.7% (normal)"],verification:"Disclosed YoY +11.4% matches dashboard FY2023 24.5 back-calculation +11.44% → data reliability confirmed",meta:"2026-04-21 FY2024 SEMS evidence reflected"},zh:{confirmed:"FY2024 27.304吨 / FY2025 22.756吨",basis:["FY2024：环境信息公开系统公示数据（事业场一连番号682-85-00866_1）","FY2024 = 自行测量27.304吨 + TMS 0吨（未安装TMS）","FY2025：基于自主大气测量报告"],yoy:["FY2023→FY2024：+11.44%（正常）","FY2024→FY2025：-16.7%（正常）"],verification:"公示同比+11.4% = 仪表板FY2023 24.5反算值+11.44%一致 → 数据可靠性确认",meta:"2026-04-21 FY2024 SEMS证据反映"}},
  "구미:일반대기오염물질 > 황산화물(SOx)":{ko:"FY2024 2.543 ton / FY2025 0.886 ton 확정. FY2024는 환경정보공개시스템(사업장 일련번호 682-85-00866_1) 공시 데이터 반영(2026-04-21), 자가측정 2.543 ton + TMS 0 ton. 이미지 공시 YoY +3.9% = 대시보드 FY2023 2.45 역산값 +3.80% 일치. FY2025는 자체 대기측정 보고서(저유황 연료 사용) 기반. FY2024→FY2025 YoY -65.2%(큰 감소, 공장 환경안전팀 사유 확인 필요 ― 연료 전환 또는 가동률 변동 가능성).",en:"FY2024 2.543 ton / FY2025 0.886 ton confirmed. FY2024 reflects disclosure system data (plant ID 682-85-00866_1, 2026-04-21): self-measurement 2.543 ton + TMS 0 ton. Disclosed YoY +3.9% matches back-calculation from FY2023 2.45 (+3.80%). FY2025 based on in-house measurement (low-sulfur fuel). FY2024→FY2025 YoY -65.2% (sharp decrease, Gumi EHS team confirmation needed — possible fuel switch or operation rate change).",zh:"FY2024 2.543 ton / FY2025 0.886 ton确定。FY2024反映信息公开系统数据（事业场682-85-00866_1，2026-04-21）：自行测量2.543 ton + TMS 0 ton。公示同比+3.9%与FY2023 2.45反算值+3.80%一致。FY2025基于自主测量（低硫燃料）。FY2024→FY2025同比-65.2%（大幅减少，需龟尾EHS团队确认 ― 可能燃料切换或运行率变动）。"},
  "구미:일반대기오염물질 > 먼지(PM)":{ko:"FY2024 1.22 ton / FY2025 1.756 ton 확정. FY2024는 환경정보공개시스템(사업장 일련번호 682-85-00866_1) 공시 데이터 반영(2026-04-21), 자가측정 1.22 ton + TMS 0 ton(먼지는 정부 공시에서 TSP=Total Suspended Particulates로 표기). 이미지 공시 YoY -20.9% = 대시보드 FY2023 1.54 역산값 -20.78% 일치. FY2025는 자체 대기측정(분기별 등속흡인법) 기반. FY2024→FY2025 YoY +43.9%(큰 증가, 공장 환경안전팀 사유 확인 필요 ― 가동률 상승 또는 방지설비 효율 변동 가능성).",en:"FY2024 1.22 ton / FY2025 1.756 ton confirmed. FY2024 reflects disclosure system data (plant ID 682-85-00866_1, 2026-04-21): self-measurement 1.22 ton + TMS 0 ton (disclosure labels PM as TSP = Total Suspended Particulates). Disclosed YoY -20.9% matches FY2023 1.54 back-calculation (-20.78%). FY2025 based on in-house quarterly isokinetic sampling. FY2024→FY2025 YoY +43.9% (sharp increase, Gumi EHS confirmation needed — possible utilization rate rise or abatement efficiency change).",zh:"FY2024 1.22 ton / FY2025 1.756 ton确定。FY2024反映信息公开系统数据（事业场682-85-00866_1，2026-04-21）：自行测量1.22 ton + TMS 0 ton（政府公示中颗粒物以TSP标示）。公示同比-20.9%与FY2023 1.54反算值-20.78%一致。FY2025基于自主季度等速采样。FY2024→FY2025同比+43.9%（大幅增加，需龟尾EHS确认 ― 可能运行率上升或防治设施效率变动）。"},
  "구미:유해대기오염물질(HAPs) > 염화수소(HCl)":{ko:"FY2025 0.128 ton 확정 (자체 대기측정 보고서 기반). 분기별 측정 농도 × 배출유량 산출. 미량 배출 수준. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 0.128 ton confirmed (in-house measurement). Quarterly concentration × emission flow. Trace emission level. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 0.128 ton确定（自主大气测量报告）。季度测量浓度 × 排放流量。微量排放水平。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:유해대기오염물질(HAPs) > 일산화탄소(CO)":{ko:"FY2025 4.513 ton 확정 (자체 대기측정 보고서 기반). 보일러 연소시설 분기별 측정 농도 × 배출유량 산출. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 4.513 ton confirmed (in-house measurement). Boiler combustion facility quarterly concentration × emission flow. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 4.513 ton确定（自主大气测量报告）。锅炉燃烧设施季度测量浓度 × 排放流量。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:최종 방류지별 폐수 배출량 > 하수처리":{ko:"FY2025 189,800 m³ 확정 (구미공장 폐수배출업소 조사표 기반). 자체 전처리 후 공공하수처리장으로 방류한 연간 총량. 본 수치는 행81~84 수질오염물질 배출량(BOD·COD·SS·TN) 산출의 분모로 사용됨. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 189,800 m³ confirmed (based on Gumi plant wastewater discharge survey). Annual total discharged to public sewage treatment plant after in-house pretreatment. This figure serves as the denominator for water pollutants (BOD/COD/SS/TN) calculations in rows 81-84. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 189,800 m³确定（基于龟尾工厂废水排放调查表）。自主预处理后排入公共污水处理厂的年度总量。本数值用作行81-84水污染物排放量（BOD·COD·SS·TN）计算的分母。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:최종 방류지별 폐수 배출량 > 위탁처리":{ko:"FY2025 78.440 ton 확정 (지정폐기물 위탁처리 폐액 기준, 처리업체 인계서 합산). 주로 공정에서 발생하는 폐유·폐알칼리 등 별도 위탁처리한 액상 폐기물. 일반 하수처리 방류량(189,800 m³)과는 별도 경로. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 78.440 ton confirmed (designated waste outsourced wastewater liquids, summed from waste manifests). Primarily liquid waste (waste oil, waste alkali, etc.) outsourced separately from process. Separate route from general sewage discharge (189,800 m³). YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 78.440 ton确定（指定废物委托处理废液基准，处理业者交接单合计）。主要为工艺产生的废油·废碱等单独委托处理的液态废物。与一般污水处理排放量（189,800 m³）为独立路径。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:수질오염물질 배출량 > BOD":{ko:"FY2025 0.294 ton 확정 (폐수배출업소 조사표 기반). 산출식: 분기별 측정 농도 × 연간 폐수량 189,800 m³. 평균 농도 약 1.549 mg/L 수준. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 0.294 ton confirmed (based on wastewater discharge survey). Formula: quarterly concentration × annual discharge 189,800 m³. Avg concentration ~1.549 mg/L. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 0.294 ton确定（基于废水排放调查表）。计算式：季度测量浓度 × 年度废水量189,800 m³。平均浓度约1.549 mg/L水平。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:수질오염물질 배출량 > COD":{ko:"FY2025 1.534 ton 확정 (폐수배출업소 조사표 기반). 산출식: 분기별 측정 농도 × 연간 폐수량 189,800 m³. 평균 농도 약 8.082 mg/L 수준. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 1.534 ton confirmed (based on wastewater discharge survey). Formula: quarterly concentration × annual discharge 189,800 m³. Avg concentration ~8.082 mg/L. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 1.534 ton确定（基于废水排放调查表）。计算式：季度测量浓度 × 年度废水量189,800 m³。平均浓度约8.082 mg/L水平。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:수질오염물질 배출량 > SS":{ko:"FY2025 2.369 ton 확정 (폐수배출업소 조사표 기반). 산출식: 분기별 측정 농도 × 연간 폐수량 189,800 m³. 평균 농도 약 12.481 mg/L 수준. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 2.369 ton confirmed (based on wastewater discharge survey). Formula: quarterly concentration × annual discharge 189,800 m³. Avg concentration ~12.481 mg/L. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 2.369 ton确定（基于废水排放调查表）。计算式：季度测量浓度 × 年度废水量189,800 m³。平均浓度约12.481 mg/L水平。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:수질오염물질 배출량 > T-N":{ko:"FY2025 4.658 ton 확정 (폐수배출업소 조사표 기반). 산출식: 분기별 측정 농도 × 연간 폐수량 189,800 m³. 평균 농도 약 24.542 mg/L 수준. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 4.658 ton confirmed (based on wastewater discharge survey). Formula: quarterly concentration × annual discharge 189,800 m³. Avg concentration ~24.542 mg/L. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 4.658 ton确定（基于废水排放调查表）。计算式：季度测量浓度 × 年度废水量189,800 m³。平均浓度约24.542 mg/L水平。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作업登记VERIFIED。"},
  "구미:폐기물 처리 비용":{ko:"FY2025 631,776,000원 확정 (SAP 전표 기반, 세전/VAT 제외). 일반폐기물·지정폐기물 위탁처리업체 지급 비용 합산. FY2024 대비 변동 ±30% 이내 정상. ※ 단, 2026-04-17 시점 채팅에서 'SAP 전표 미수취'로 기록되어 있어 출처 재확인 필요 (입력값 자체는 템플릿 제출값 기준 유지). 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 KRW 631,776,000 confirmed (SAP voucher basis, pre-tax/VAT excluded). Sum of payments to general and designated waste contractors. YoY within ±30%, normal. ※ Note: As of 2026-04-17 chat record, SAP vouchers were marked as 'not received', source re-verification needed (value itself maintained per template submission). Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 KRW 631,776,000确定（基于SAP凭证，税前/不含VAT）。一般废物·指定废物委托处理业者支付费用合计。同比变动在±30%以内，正常。※ 但根据2026-04-17聊天记录，SAP凭证标记为'未收到'，需重新确认出处（输入值本身按模板提交值保持）。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:폐수 처리 비용":{ko:"FY2025 396,928,000원 확정 (SAP 전표 기반, 세전/VAT 제외). 공공하수도 사용료 등 폐수 위탁처리 관련 비용. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 KRW 396,928,000 confirmed (SAP voucher basis, pre-tax). Public sewage usage fees and outsourced wastewater treatment costs. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 KRW 396,928,000确定（基于SAP凭证，税前）。公共下水道使用费等委托废水处理相关费用。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:환경오염구제 책임보험":{ko:"FY2025 18,957,400원 확정 (보험 증권 기반, 세전). 환경오염피해 배상책임보험 연간 보험료. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 KRW 18,957,400 confirmed (insurance policy basis, pre-tax). Annual premium for environmental pollution liability insurance. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 KRW 18,957,400确定（基于保险单，税前）。环境污染损害赔偿责任保险年度保费。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:환경배출물질 측정비용":{ko:"FY2025 205,890,000원 확정 (SAP 전표 기반, 세전). 대기·수질 자가측정, LDAR, 환경모니터링 등 위탁측정 용역비 합산. FY2024 대비 변동 ±30% 이내 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 KRW 205,890,000 confirmed (SAP voucher basis, pre-tax). Sum of outsourced measurement service fees: air/water self-measurement, LDAR, environmental monitoring, etc. YoY within ±30%, normal. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 KRW 205,890,000确定（基于SAP凭证，税前）。大气·水质自主测量、LDAR、环境监测等委托测量服务费合计。同比变动在±30%以内，正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},
  "구미:환경개선 시설투자":{ko:"FY2025 20,000,000원 확정 (SAP 전표 기반, 세전). 환경개선 목적 신증설·설비교체 투자 합산. FY2024 148,000,000원 대비 -86.5%이나, 시설투자는 연도별 변동성이 구조적으로 크며 신규 대규모 투자 미발생 시 정상. 2026-04-20 Phase 1 복구 작업으로 VERIFIED 등록.",en:"FY2025 KRW 20,000,000 confirmed (SAP voucher basis, pre-tax). Sum of new/expansion/replacement investments for environmental improvement. -86.5% vs FY2024 KRW 148,000,000, but facility investment has structurally high year-on-year volatility; normal when no major new investment. Registered VERIFIED via 2026-04-20 Phase 1 recovery.",zh:"FY2025 KRW 20,000,000确定（基于SAP凭证，税前）。环境改善目的的新增·设备更换投资合计。相比FY2024 KRW 148,000,000下降-86.5%，但设施投资具有结构性年度波动，无大型新增投资时为正常。2026-04-20 Phase 1恢复作业登记VERIFIED。"},

  "대구:수질오염물질 배출량 > BOD":{ko:{confirmed:"FY2025 2.105 ton",basis:["폐수배출업소 조사표 기반","산출식: 측정 농도 × 연간 폐수량 526,328 m³","평균 농도 약 4.0 mg/L"],yoy:["FY2024 3.5 → FY2025 2.105 = -39.8% (산업 특성상 정상)"],verification:"대구공장은 폴리에스터 염색공정으로 다른 산업과 달리 고정적인 폐수량과 오염물질(부하량)을 가질 수 없음. 측정일의 염색 물량·사용 수량·염료(백색·진색)·조제 사용량·공정 단계(염색/수세)에 따라 부하량이 시시각각 변동하며, 일 사용 용수량(약 2,200 ton) 규모로 집수조 평균화도 곤란. 낮은 농도에서의 변화량은 산업 특성상 정상",meta:"2026-04-20 환경안전팀(이길호 부장) 회신 반영, YoY 이상치 해소"},en:{confirmed:"FY2025 2.105 ton",basis:["Per wastewater discharger survey","Calculation: measured concentration × annual wastewater 526,328 m³","Avg concentration ~4.0 mg/L"],yoy:["FY2024 3.5 → FY2025 2.105 = -39.8% (normal due to industry characteristics)"],verification:"Daegu plant uses polyester dyeing process which cannot have fixed wastewater volume and pollutants (load). Load varies by measurement day's dyeing volume, water usage, dye type (light/dark), additives, process stage (dyeing/rinsing). Daily ~2,200 ton water usage makes equalization basin averaging difficult. Variations at low concentrations are normal for this industry",meta:"2026-04-20 EHS team (Director LEE GIL HO) response reflected, YoY anomaly resolved"},zh:{confirmed:"FY2025 2.105 ton",basis:["基于废水排放业所调查表","核算式：测量浓度 × 年度废水量526,328 m³","平均浓度约4.0 mg/L"],yoy:["FY2024 3.5 → FY2025 2.105 = -39.8%（行业特性下属正常）"],verification:"大邱工厂为聚酯染色工艺，与其他行业不同，无法具有固定的废水量和污染物（负荷量）。测量日的染色物量·使用水量·染料（白色·深色）·调剂使用量·工艺阶段（染色/水洗）的负荷量时刻变动，日使用水量约2,200 ton规模，集水槽平均化也困难。低浓度下的变化量在行业特性下属正常",meta:"2026-04-20 EHS团队（李吉浩部长）回复反映，YoY异常值解消"}},

  "울산:일반대기오염물질 > 질소산화물(NOx)": {ko:"FY2024 18.279 ton / FY2025 10.731 ton 확정. FY2024는 환경정보공개시스템(사업장 일련번호 739-85-00949_1) 공시 데이터 반영(2026-04-21), TMS 자동측정 5.934 ton + 자가측정 12.345 ton = 합계 18.279 ton. 이미지 공시 YoY -16.7% = 대시보드 FY2023 21.95 역산값 -16.72% 일치. 울산은 한국 3공장 중 유일하게 TMS 부착 배출구 보유(TMS 부착 여부=Y). FY2025는 자체 대기측정 기반 템플릿 값. FY2024→FY2025 YoY -41.3%(큰 감소, 공장 환경안전팀 사유 확인 필요 ― 연소시설 가동률 감소 또는 저NOx 버너 설비 개선 가능성).",en:"FY2024 18.279 ton / FY2025 10.731 ton confirmed. FY2024 reflects disclosure system data (plant ID 739-85-00949_1, 2026-04-21): TMS auto-measurement 5.934 ton + self-measurement 12.345 ton = total 18.279 ton. Disclosed YoY -16.7% matches FY2023 21.95 back-calculation (-16.72%). Ulsan is the only one of 3 Korean plants with TMS-equipped stacks (TMS=Y). FY2025 based on template value from in-house measurement. FY2024→FY2025 YoY -41.3% (large decrease, Ulsan EHS confirmation needed — possible combustion utilization drop or low-NOx burner improvement).",zh:"FY2024 18.279 ton / FY2025 10.731 ton确定。FY2024反映信息公开系统数据（事业场739-85-00949_1，2026-04-21）：TMS自动测量5.934 ton + 自行测量12.345 ton = 合计18.279 ton。公示同比-16.7%与FY2023 21.95反算值-16.72%一致。蔚山是韩国3家工厂中唯一装有TMS排放口的工厂（TMS=Y）。FY2025基于自主大气测量模板值。FY2024→FY2025同比-41.3%（大幅减少，需蔚山EHS确认 ― 可能燃烧设施运行率下降或低NOx燃烧器改善）。"},
  "울산:일반대기오염물질 > 황산화물(SOx)": {ko:"FY2024 0.587 ton / FY2025 0.771 ton 확정. FY2024는 환경정보공개시스템(사업장 일련번호 739-85-00949_1) 공시 데이터 반영(2026-04-21), TMS 자동측정 0 ton + 자가측정 0.587 ton = 합계 0.587 ton. 이미지 공시 YoY -0.5% = 대시보드 FY2023 0.59 역산값 -0.51% 일치. FY2025는 자체 대기측정 기반 템플릿 값. FY2024→FY2025 YoY +31.3%(YoY 임계 30% 초과, 공장 환경안전팀 사유 확인 필요 ― 연료 조성 변동 또는 가동률 상승 가능성).",en:"FY2024 0.587 ton / FY2025 0.771 ton confirmed. FY2024 reflects disclosure system data (plant ID 739-85-00949_1, 2026-04-21): TMS auto-measurement 0 ton + self-measurement 0.587 ton = total 0.587 ton. Disclosed YoY -0.5% matches FY2023 0.59 back-calculation (-0.51%). FY2025 based on template value from in-house measurement. FY2024→FY2025 YoY +31.3% (exceeds YoY threshold of 30%, Ulsan EHS confirmation needed — possible fuel composition or utilization change).",zh:"FY2024 0.587 ton / FY2025 0.771 ton确定。FY2024反映信息公开系统数据（事业场739-85-00949_1，2026-04-21）：TMS自动测量0 ton + 自行测量0.587 ton = 合计0.587 ton。公示同比-0.5%与FY2023 0.59反算值-0.51%一致。FY2025基于自主大气测量模板值。FY2024→FY2025同比+31.3%（超过30%同比阈值，需蔚山EHS确认 ― 可能燃料组成或运行率变动）。"},
  "울산:일반대기오염물질 > 먼지(PM)": {ko:"FY2024 1.692 ton / FY2025 0.859 ton 확정. FY2024는 환경정보공개시스템(사업장 일련번호 739-85-00949_1) 공시 데이터 반영(2026-04-21), TMS 자동측정 0 ton + 자가측정 1.692 ton = 합계 1.692 ton. 이미지 공시 YoY +13.9% = 대시보드 FY2023 1.48 역산값 +14.32% 근접(정부 공시 소수점 반올림 차이). FY2025는 자체 대기측정 기반 템플릿 값. FY2024→FY2025 YoY -49.2%(큰 감소, 공장 환경안전팀 사유 확인 필요 ― 집진설비 효율 개선 또는 가동률 감소 가능성).",en:"FY2024 1.692 ton / FY2025 0.859 ton confirmed. FY2024 reflects disclosure system data (plant ID 739-85-00949_1, 2026-04-21): TMS auto-measurement 0 ton + self-measurement 1.692 ton = total 1.692 ton. Disclosed YoY +13.9% approximately matches FY2023 1.48 back-calculation (+14.32%, gap from government decimal rounding). FY2025 based on template value from in-house measurement. FY2024→FY2025 YoY -49.2% (large decrease, Ulsan EHS confirmation needed — possible dust collector efficiency improvement or utilization drop).",zh:"FY2024 1.692 ton / FY2025 0.859 ton确定。FY2024反映信息公开系统数据（事业场739-85-00949_1，2026-04-21）：TMS自动测量0 ton + 自行测量1.692 ton = 合计1.692 ton。公示同比+13.9%与FY2023 1.48反算值+14.32%接近（政府公示小数点舍入差异）。FY2025基于自主大气测量模板值。FY2024→FY2025同比-49.2%（大幅减少，需蔚山EHS确认 ― 可能集尘设施效率改善或运行率下降）。"},
  "브라질스판:폐수 처리 비용":{ko:{confirmed:"FY2025 61,118.01 BRL (세전)",basis:["법인 재송부 Net price 기준, 폐수처리 약품 인보이스 42건 합계","산출: Total(세후) 79,241.35 BRL − ICMS 12,255.87 − IPI 388.20 − PIS/COFINS 6,229.66 = 60,367.62 + 업체 Net 가산분 = 61,118.01 BRL","공제 세금 3종(ICMS 주간 유통세·IPI 공업제품세·PIS/COFINS 연방 사회보장기여세)은 모두 간접세로 본사 원칙(전 법인 세전 보고) 부합","주요 약품: 인산·차아염소산나트륨·폴리염화알루미늄·음이온/양이온 폴리머"],yoy:["FY2024 → FY2025: -39.1% (세후→세전 기준 전환의 영향 포함, 실질 감소폭은 약 -20%)"],verification:"기준 혼재 주의: FY2023 137,466.71 / FY2024 100,336.68 BRL은 기존 세후 기준으로 유지 중",meta:"증빙: BR_폐수처리약품_비용_26_04_20_.xlsx (42건 인보이스 번호 전건 대조). 2026-04-21 적용"},en:{confirmed:"FY2025 61,118.01 BRL (pre-tax)",basis:["Subsidiary re-submitted Net price basis, sum of 42 wastewater treatment chemical invoices","Calc: Total (post-tax) 79,241.35 BRL − ICMS 12,255.87 − IPI 388.20 − PIS/COFINS 6,229.66 = 60,367.62 + vendor Net additions = 61,118.01 BRL","All 3 deducted taxes (ICMS state circulation tax, IPI industrial product tax, PIS/COFINS federal social contribution) are indirect taxes, conforming to HQ principle (pre-tax reporting for all)","Key chemicals: phosphoric acid, sodium hypochlorite, aluminum polychloride, anionic/cationic polymers"],yoy:["FY2024 → FY2025: -39.1% (incl. impact of post-tax→pre-tax basis change, actual decrease ~-20%)"],verification:"Mixed basis caution: FY2023 137,466.71 / FY2024 100,336.68 BRL maintained on previous post-tax basis",meta:"Evidence: BR_WW_chemicals_cost_26_04_20_.xlsx (42 invoice numbers all cross-checked). Applied 2026-04-21"},zh:{confirmed:"FY2025 61,118.01 BRL (税前)",basis:["法人重新发送Net price基准，废水处理药品发票42件合计","核算：Total(税后) 79,241.35 BRL − ICMS 12,255.87 − IPI 388.20 − PIS/COFINS 6,229.66 = 60,367.62 + 业者Net加算分 = 61,118.01 BRL","扣除税金3种(ICMS州间流通税·IPI工业产品税·PIS/COFINS联邦社会保障税)均为间接税，符合总部原则(全法人税前报告)","主要药品：磷酸·次氯酸钠·聚氯化铝·阴离子/阳离子聚合物"],yoy:["FY2024 → FY2025：-39.1% (含税后→税前基准转换影响，实际减少约-20%)"],verification:"基准混合注意：FY2023 137,466.71 / FY2024 100,336.68 BRL保持原税后基准",meta:"证据：BR_废水处理药品_费用_26_04_20_.xlsx (42件发票号全件对比)。2026-04-21适用"}},
  "브라질스판:환경배출물질 측정비용":{ko:{confirmed:"FY2025 29,094.68 BRL (세전)",basis:["법인 재송부 Net price 기준, 측정 서비스 인보이스 17건 합계","산출: Total(세후) 31,001.26 BRL − IR 465.02 − CSLL 310.01 − COFINS 930.04 − PIS/PASEP 201.51 = 29,094.68 BRL","공제 세금 4종 중 IR(소득세 원천징수)·CSLL(사회기여금)은 직접세이나 법인 Net price 기준에 포함, 본사 원칙(세전 보고)에 따라 법인 제공 Net price 그대로 적용","공급업체: ACQUAPLANT 14건(주로 수질 물리화학 분석), ORGANICA 2건(대기+물리화학), ASM 1건(대기 분석)"],yoy:["FY2024 → FY2025: +61.4% (세후→세전 전환 반영한 값, 세후 기준 YoY는 +72.0%)"],verification:"기준 혼재 주의: FY2023 10,341.5 / FY2024 18,026.08 BRL은 기존 세후 기준으로 유지 중",meta:"증빙: BR_측정_비용_26_04_20_.xlsx (17건 인보이스 번호 전건 대조). 2026-04-21 적용"},en:{confirmed:"FY2025 29,094.68 BRL (pre-tax)",basis:["Subsidiary re-submitted Net price basis, sum of 17 measurement service invoices","Calc: Total (post-tax) 31,001.26 BRL − IR 465.02 − CSLL 310.01 − COFINS 930.04 − PIS/PASEP 201.51 = 29,094.68 BRL","Of 4 deducted taxes, IR (income tax withholding) and CSLL (social contribution) are direct taxes but included in subsidiary Net price; per HQ principle (pre-tax reporting), subsidiary-provided Net price applied as-is","Vendors: ACQUAPLANT 14 (mainly water physiochemical analysis), ORGANICA 2 (atmospheric + physiochemical), ASM 1 (atmospheric)"],yoy:["FY2024 → FY2025: +61.4% (reflects post-tax→pre-tax conversion, post-tax basis YoY is +72.0%)"],verification:"Mixed basis caution: FY2023 10,341.5 / FY2024 18,026.08 BRL maintained on previous post-tax basis",meta:"Evidence: BR_measurement_cost_26_04_20_.xlsx (17 invoice numbers all cross-checked). Applied 2026-04-21"},zh:{confirmed:"FY2025 29,094.68 BRL (税前)",basis:["法人重新发送Net price基准，测量服务发票17件合计","核算：Total(税后) 31,001.26 BRL − IR 465.02 − CSLL 310.01 − COFINS 930.04 − PIS/PASEP 201.51 = 29,094.68 BRL","扣除税金4种中IR(所得税源泉征收)·CSLL(社会贡献金)为直接税但包含在法人Net price中，按总部原则(税前报告)直接适用法人提供Net price","供应商：ACQUAPLANT 14件(主要水质物理化学分析)、ORGANICA 2件(大气+物理化学)、ASM 1件(大气分析)"],yoy:["FY2024 → FY2025：+61.4% (反映税后→税前转换值，税后基准YoY为+72.0%)"],verification:"基准混合注意：FY2023 10,341.5 / FY2024 18,026.08   "울산:폐수 처리 비용": {ko:"FY2025 198,698,546원 확정 (환경안전팀 회신, 2026-04). 공공하수도 사용료 등 폐수 위탁처리 관련 비용. 한국 3공장 본사 안내 원칙에 따라 세전(공급가액, 부가세 제외) 기준 적용. FY2024 438,413,429 → FY2025 198,698,546 (-54.7%, 큰 감소이나 환경안전팀 회신 자료 기반 확정값으로 유지). 2026-04-21 신규 VERIFIED 등록 (이전 미등록 상태 보강).",en:"FY2025 KRW 198,698,546 confirmed (Env. Safety team response, 2026-04). Public sewage usage fees and outsourced wastewater treatment costs. Pre-tax basis (supply price, excl. VAT) per HQ guidance for 3 Korean plants. FY2024 438,413,429 → FY2025 198,698,546 (-54.7%, sharp decrease but maintained as confirmed value from Env. Safety team data). Newly registered VERIFIED on 2026-04-21 (previously unregistered).",zh:"FY2025 198,698,546韩元确定（环境安全组回复，2026-04）。公共下水道使用费等废水委托处理相关费用。按总部对3家韩国工厂的指引，适用税前基准（供应价，不含增值税）。FY2024 438,413,429 → FY2025 198,698,546（-54.7%，大幅减少但作为环境安全组回复资料的确定值维持）。2026-04-21新登记VERIFIED（此前未登记状态补充）。"},

function isVerified(sub, label) { const v = VERIFIED[sub+":"+label]; return v ? v : null; }
function isNA(sub, label) { const v = NOT_APPLICABLE[sub+":"+label]; return v ? v : null; }
function effectiveFlags(sub, label, data) {
  if (isNA(sub, label)) return ["na"];
  const flags = cellStatus(data);
  if (isVerified(sub, label)) return flags.filter(f => f !== "yoy_25" && f !== "yoy_24");
  return flags;
}

  "주해스판":"CNY","취저우스판":"CNY","취저우네오캠":"CNY","닝샤스판":"CNY",

};
function getCurrency(sub) { return CURRENCY_MAP[sub] || "LC"; }
function unitDisplay(unit, sub) {
  if (unit === "현지화" && sub) return getCurrency(sub);
  return unit;
}

function fmt(v) {
  if (v === null || v === undefined) return null;
  if (Number.isInteger(v)) return v.toLocaleString();
  if (Math.abs(v) < 0.0001 && v !== 0) return v.toExponential(2);
  if (Math.abs(v) < 1) return v.toFixed(4);
  if (Math.abs(v) < 100) return v.toFixed(2);
  const s = v.toString();
  const dotIdx = s.indexOf('.');
  if (dotIdx === -1) return v.toLocaleString();
  const decimals = Math.min(s.length - dotIdx - 1, 6);
  return v.toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}

function yoyPct(prev, cur) {
  if (prev == null || cur == null) return null;
  if (prev === 0 && cur === 0) return 0;
  if (prev === 0) return cur > 0 ? 999 : -999;
  return (cur - prev) / Math.abs(prev);
}

function cellStatus(vals) {
  const [y23, y24, y25] = vals;
  const flags = [];
  // Missing 2025 when historical exists
  const hasHist = y23 != null || y24 != null;
  if (y25 == null && hasHist) flags.push("missing_2025");
  if (y25 == null && !hasHist) flags.push("no_data");
  // YoY anomalies (reporting year vs prior year only)
  const chg25 = yoyPct(y24, y25);
  if (chg25 != null && Math.abs(chg25) > YOY_THRESHOLD) flags.push("yoy_25");
  return flags;
}

function Sparkline({ vals }) {
  const valid = vals.map((v,i)=>v!=null?{v,i}:null).filter(Boolean);
  if (valid.length < 2) return <span style={{color:"#999",fontSize:10}}>—</span>;
  const mn = Math.min(...valid.map(d=>d.v));
  const mx = Math.max(...valid.map(d=>d.v));
  const range = mx-mn || 1;
  const pts = valid.map(d=>`${8+d.i*20},${30-((d.v-mn)/range)*24}`).join(" ");
  return <svg width="56" height="34" style={{verticalAlign:"middle"}}><polyline points={pts} fill="none" stroke="#6366f1" strokeWidth="2"/>{valid.map(d=><circle key={d.i} cx={8+d.i*20} cy={30-((d.v-mn)/range)*24} r="2.5" fill="#6366f1"/>)}</svg>;
}

                <td style={{padding:"8px 12px",fontWeight:500,color:isNARow?"#94a3b8":"#0f172a",cursor:isNARow?"help":"default"}} title={tNote(naNote)}>{t("label",ind.label)}{getManual(ind.label) && <button onClick={()=>setManualLabel(ind.label)} style={{border:"none",background:"none",cursor:"pointer",fontSize:12,marginLeft:4,padding:"0 2px",color:"#6366f1",verticalAlign:"middle"}} title={lang==="ko"?"집계 기준 매뉴얼":lang==="en"?"Reporting Manual":"集计标准手册"}>📖</button>}</td>
                <td style={{padding:"8px",textAlign:"center",color:"#94a3b8",fontSize:11}}>{ind.unit==="현지화"?getCurrency(selSub):t("unit",ind.unit)}</td>
                <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[0]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[0]!=null?fmt(d[0]):"—"}</td>
                <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[1]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[1]!=null?fmt(d[1]):"—"}</td>
                <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",fontWeight:isNARow?400:600,color:isNARow?"#cbd5e1":d[2]==null?(flags.includes("missing_2025")?"#ef4444":"#cbd5e1"):"#0f172a"}}>{isNARow?"—":d[2]!=null?fmt(d[2]):flags.includes("missing_2025")?<span style={{color:"#ef4444",fontWeight:400}}>{tui("notEntered")}</span>:"—"}</td>
                <td style={{padding:"4px 8px",textAlign:"center"}}>{isNARow?<span style={{color:"#cbd5e1",fontSize:10}}>—</span>:<Sparkline vals={d}/>}</td>
                <td style={{padding:"8px",textAlign:"center",fontSize:12,fontWeight:600,color:isNARow?"#cbd5e1":chg==null?"#94a3b8":(Math.abs(chg)>YOY_THRESHOLD&&!vNote)?"#dc2626":"#16a34a"}}>
                  {isNARow?"—":chg!=null ? (chg>=0?"+":"") + (chg*100).toFixed(0)+"%" : "—"}
                </td>
                <td style={{padding:"8px",textAlign:"center"}} title={tNote(naNote||vNote)}>
                  {isNARow && <span title={tNote(naNote)} style={{color:"#94a3b8",fontSize:13,cursor:"help"}}>─</span>}
                  {!isNARow && flags.includes("missing_2025") && <span title={tui("missing25")} style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#fbbf24",color:"#fff",fontSize:11,fontWeight:700}}>!</span>}
                  {!isNARow && (flags.includes("yoy_24")||flags.includes("yoy_25")) && <span title={tui("yoyAnomaly")} style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#ef4444",color:"#fff",fontSize:11,fontWeight:700,marginLeft:2}}>⚠</span>}
                  {!isNARow && !flags.includes("missing_2025") && !flags.includes("yoy_24") && !flags.includes("yoy_25") && <span title={tNote(vNote)} style={{color:"#22c55e",fontSize:14,cursor:vNote?"help":"default"}}>✓</span>}
                </td>
                <td style={{padding:"8px",textAlign:"center"}}>
                  {(vNote||naNote) && <button onClick={(e)=>{e.stopPropagation();setVerifPanel({sub:selSub,label:ind.label});}} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,padding:"2px 4px",color:isNARow?"#94a3b8":"#22c55e",verticalAlign:"middle"}} title={lang==="ko"?"검수 내역 보기":lang==="en"?"View Verification":"查看审核记录"}>🔍</button>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
  );

  const renderByIndicatorTable = () => {
    const ind = RAW.indicators[selIndicator];
    if (!ind) return null;
    const subsWithData = SUBS.filter(s => ind.data[s] && ind.data[s].some(v => v != null));
    return (
      <div>
        <div style={{marginBottom:12}}>
          <select value={selIndicator} onChange={e=>setSelIndicator(+e.target.value)}
            style={{padding:"8px 12px",borderRadius:6,border:"1px solid #cbd5e1",fontSize:13,width:"100%",background:"#fff"}}>
            {RAW.indicators.map((ind,i) => <option key={i} value={i}>{getRow(ind.label) ? `${tui("row")}${getRow(ind.label)} ` : ""}[{t("cat",ind.cat)}] {t("label",ind.label)} ({t("unit",ind.unit)})</option>)}
          </select>
        </div>
        {getManual(ind.label) && <div style={{marginBottom:10,padding:"6px 12px",background:"#f5f3ff",border:"1px solid #c4b5fd",borderRadius:6,fontSize:11,color:"#5b21b6",cursor:"pointer"}} onClick={()=>setManualLabel(ind.label)}>📖 {lang==="ko"?"집계 기준 매뉴얼 보기":lang==="en"?"View Reporting Manual":"查看集计标准手册"}</div>}
        <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:13,fontFamily:"'Pretendard','Noto Sans KR',sans-serif"}}>
          <thead>
            <tr style={{background:"#1e293b",color:"#fff"}}>
              <th style={{padding:"10px 12px",textAlign:"left",position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("sub")}</th>
              <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2023</th>
              <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2024</th>
              <th style={{padding:"10px 8px",textAlign:"right",width:130,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>2025</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:65,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("trend")}</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:80,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>YoY 24→25</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:60,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("status")}</th>
              <th style={{padding:"10px 8px",textAlign:"center",width:50,position:"sticky",top:0,zIndex:2,background:"#1e293b"}}>{tui("verif")}</th>
            </tr>
          </thead>
          <tbody>
            {subsWithData.map(sub => {
              const d = ind.data[sub];
              const flags = effectiveFlags(sub, ind.label, d);
              const chg = yoyPct(d[1], d[2]);
              const isDom = RAW.domestic.includes(sub);
              const vNote = isVerified(sub, ind.label);
              const naNote = isNA(sub, ind.label);
              const isNARow = flags.includes("na");
              return (
                <tr key={sub} style={{background: bgColor(flags),borderBottom:"1px solid #e2e8f0"}}>
                  <td style={{padding:"8px 12px",fontWeight:500,color:isNARow?"#94a3b8":"#0f172a",cursor:isNARow?"help":"default"}} title={tNote(naNote)}>
                    <span style={{display:"inline-block",width:6,height:6,borderRadius:3,background:isDom?"#3b82f6":"#f59e0b",marginRight:6}}/>
                    {t("sub",sub)}{ind.unit==="현지화"&&<span style={{marginLeft:6,fontSize:10,color:"#94a3b8",fontWeight:400}}>({getCurrency(sub)})</span>}
                  </td>
                  <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[0]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[0]!=null?fmt(d[0]):"—"}</td>
                  <td style={{padding:"8px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:isNARow?"#cbd5e1":d[1]==null?"#cbd5e1":"#334155"}}>{isNARow?"—":d[1]!=null?fmt(d[1]):"—"}</td>
                  <td style={{padding:"8px",textAlign:"right",fontWeight:isNARow?400:600,color:isNARow?"#cbd5e1":d[2]==null?(flags.includes("missing_2025")?"#ef4444":"#cbd5e1"):"#0f172a"}}>{isNARow?"—":d[2]!=null?fmt(d[2]):flags.includes("missing_2025")?<span style={{color:"#ef4444",fontWeight:400}}>{tui("notEntered")}</span>:"—"}</td>
                  <td style={{padding:"4px 8px",textAlign:"center"}}>{isNARow?<span style={{color:"#cbd5e1",fontSize:10}}>—</span>:<Sparkline vals={d}/>}</td>
                  <td style={{padding:"8px",textAlign:"center",fontSize:12,fontWeight:600,color:isNARow?"#cbd5e1":chg==null?"#94a3b8":(Math.abs(chg)>YOY_THRESHOLD&&!vNote)?"#dc2626":"#16a34a"}}>
                    {isNARow?"—":chg!=null?(chg>=0?"+":"")+(chg*100).toFixed(0)+"%":"—"}
                  </td>
                  <td style={{padding:"8px",textAlign:"center"}} title={tNote(naNote||vNote)}>
                    {isNARow && <span title={tNote(naNote)} style={{color:"#94a3b8",fontSize:13,cursor:"help"}}>─</span>}
                    {!isNARow && flags.includes("missing_2025") && <span style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#fbbf24",color:"#fff",fontSize:11,fontWeight:700}}>!</span>}
                    {!isNARow && (flags.includes("yoy_24")||flags.includes("yoy_25")) && <span style={{display:"inline-block",width:20,height:20,lineHeight:"20px",borderRadius:4,background:"#ef4444",color:"#fff",fontSize:11,fontWeight:700,marginLeft:2}}>⚠</span>}
                    {!isNARow && !flags.includes("missing_2025") && !flags.includes("yoy_24") && !flags.includes("yoy_25") && <span title={tNote(vNote)} style={{color:"#22c55e",fontSize:14,cursor:vNote?"help":"default"}}>✓</span>}
                  </td>
                  <td style={{padding:"8px",textAlign:"center"}}>
                    {(vNote||naNote) && <button onClick={(e)=>{e.stopPropagation();setVerifPanel({sub:sub,label:ind.label});}} style={{border:"none",background:"none",cursor:"pointer",fontSize:13,padding:"2px 4px",color:isNARow?"#94a3b8":"#22c55e",verticalAlign:"middle"}} title={lang==="ko"?"검수 내역 보기":lang==="en"?"View Verification":"查看审核记录"}>🔍</button>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  };

  return (
    <div style={{fontFamily:"'Pretendard','Noto Sans KR',system-ui,sans-serif",background:"#f8fafc",minHeight:"100vh",color:"#0f172a"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)",color:"#fff",padding:"20px 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
          <div style={{minWidth:0,flex:"1 1 auto"}}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"#94a3b8",marginBottom:4}}>{tui("subtitle")}</div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>{tui("title")}</div>
            <div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>FY2023 – FY2025 · {tui("desc")} · {SUBS.length}{tui("subs_count")} · {RAW.indicators.length}{tui("inds_count")}</div>
          </div>
          <div style={{display:"flex",gap:2,borderRadius:6,overflow:"visible",border:"1px solid #475569",flexShrink:0}}>
            {["ko","en","zh"].map(l=>(
              <button key={l} onClick={()=>setLang(l)} style={{padding:"6px 12px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:lang===l?"#fff":"transparent",color:lang===l?"#0f172a":"#94a3b8"}}>
                {l==="ko"?"KR":l==="en"?"EN":"CN"}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:"16px 24px"}}>
        {/* View mode toggle */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #cbd5e1"}}>
            {[["bySub",tui("bySub")],["byIndicator",tui("byIndicator")]].map(([m,l])=>(
              <button key={m} onClick={()=>setViewMode(m)} style={{padding:"8px 16px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:viewMode===m?"#1e293b":"#fff",color:viewMode===m?"#fff":"#64748b",transition:"all .15s"}}>{l}</button>
            ))}
          </div>
          {viewMode==="bySub" && (
            <>
              <select value={selSub} onChange={e=>setSelSub(e.target.value)} style={{padding:"8px 12px",borderRadius:6,border:"1px solid #cbd5e1",fontSize:13,fontWeight:600,background:"#fff"}}>
                <optgroup label={tui("domestic")}>{RAW.domestic.map(s=><option key={s} value={s}>{t("sub",s)}</option>)}</optgroup>
                <optgroup label={tui("overseas")}>{RAW.overseas.map(s=><option key={s} value={s}>{t("sub",s)}</option>)}</optgroup>
              </select>
              <div style={{display:"flex",borderRadius:6,overflow:"hidden",border:"1px solid #cbd5e1"}}>
                {[["all",tui("all")],["missing",tui("missing")],["anomaly",tui("anomaly")],["na","N/A"]].map(([m,l])=>(
                  <button key={m} onClick={()=>setFilterMode(m)} style={{padding:"6px 14px",fontSize:12,fontWeight:500,border:"none",cursor:"pointer",background:filterMode===m?"#475569":"#fff",color:filterMode===m?"#fff":"#64748b"}}>{l}</button>
                ))}
              </div>
            </>
          )}
        </div>

        {/* Category tabs */}
        <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>setSelCat("전체")} style={{padding:"5px 12px",borderRadius:16,border:selCat==="전체"?"2px solid #1e293b":"1px solid #e2e8f0",background:selCat==="전체"?"#1e293b":"#fff",color:selCat==="전체"?"#fff":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>{tui("all")}</button>
          {CATS.map(c=>(
            <button key={c} onClick={()=>setSelCat(c)} style={{padding:"5px 12px",borderRadius:16,border:selCat===c?"2px solid #1e293b":"1px solid #e2e8f0",background:selCat===c?"#1e293b":"#fff",color:selCat===c?"#fff":"#64748b",fontSize:11,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap"}}>{t("cat",c.trim())}</button>
          ))}
        </div>

        {/* KPI cards (bySub mode) */}
        {viewMode==="bySub" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
            {[
              {label:tui("total"),value:stats.total,color:"#3b82f6",icon:"📊"},
              {label:tui("filled"),value:stats.filled,color:"#22c55e",icon:"✅",sub:`${stats.pct}%`},
              {label:tui("missing25"),value:stats.missing,color:"#f59e0b",icon:"⚠️"},
              {label:tui("yoyAnomaly"),value:stats.anomaly,color:"#ef4444",icon:"🔴"},
            ].map(({label,value,color,icon,sub})=>(
              <div key={label} style={{background:"#fff",borderRadius:10,padding:"14px 16px",borderLeft:`4px solid ${color}`,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                <div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{icon} {label}</div>
                <div style={{fontSize:26,fontWeight:800,color,marginTop:2,fontVariantNumeric:"tabular-nums"}}>{value}{sub && <span style={{fontSize:13,fontWeight:500,color:"#64748b",marginLeft:4}}>{sub}</span>}</div>
              </div>
            ))}
          </div>
        )}

        {/* Legend */}
        <div style={{display:"flex",gap:16,marginBottom:12,fontSize:11,color:"#64748b",flexWrap:"wrap"}}>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#ecfdf5",border:"1px solid #bbf7d0",verticalAlign:"middle",marginRight:4}}/>{tui("normal")}</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#fef3c7",border:"1px solid #fde68a",verticalAlign:"middle",marginRight:4}}/>{tui("missing25")}</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#fee2e2",border:"1px solid #fecaca",verticalAlign:"middle",marginRight:4}}/>YoY ±30%</span>
          <span><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#f1f5f9",border:"1px solid #e2e8f0",verticalAlign:"middle",marginRight:4}}/>N/A</span>
        </div>

        {/* Table */}
        <div style={{background:"#fff",borderRadius:12,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",maxHeight:"calc(100vh - 340px)"}}>
          {viewMode==="bySub" ? renderBySubTable() : renderByIndicatorTable()}
        </div>

        <div style={{marginTop:12,fontSize:11,color:"#94a3b8",textAlign:"center"}}>
          {viewMode==="bySub" ? `${t("sub",selSub)}: ${filteredIndicators.length}${tui("showing")}` : `${SUBS.filter(s=>RAW.indicators[selIndicator]?.data[s]?.some(v=>v!=null)).length}${tui('subsHaveData')}`}
        </div>
      </div>
      {manualLabel && <ManualPanel label={manualLabel} lang={lang} onClose={()=>{setManualLabel(null);}}/>}
      {verifPanel && <VerificationPanel sub={verifPanel.sub} label={verifPanel.label} lang={lang} onClose={()=>setVerifPanel(null)}/>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
</script>
</body>
</html>
